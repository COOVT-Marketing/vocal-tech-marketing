<!DOCTYPE html>
<html lang="en">
<head>
  <title>VTM DNC Portal</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root {
      --bg:        #0b0f19;
      --card:      #111827;
      --card2:     #1f2937;
      --border:    #374151;
      --txt:       #f9fafb;
      --txt2:      #9ca3af;
      --txt3:      #6b7280;
      --teal:      #1a9e75;
      --teal-glow: rgba(26,158,117,0.15);
      --teal-b:    rgba(26,158,117,0.35);
      --green:     #22c55e;
      --green-glow:rgba(34,197,94,0.12);
      --green-b:   rgba(34,197,94,0.4);
      --red:       #ef4444;
      --red-glow:  rgba(239,68,68,0.12);
      --red-b:     rgba(239,68,68,0.4);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    
    body {
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--txt);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;
    }

    .card {
      background:var(--card);
      border:0.5px solid var(--border);
      border-radius:16px;
      width:100%;max-width:540px;
      overflow:hidden;
      box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
    }

    .header {
      background:#090d16;
      padding:1.4rem 2rem;
      display:flex;align-items:center;gap:14px;
      border-bottom:0.5px solid var(--border);
    }

    .logo {
      width:40px;height:40px;
      background:var(--teal);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }

    .logo i{font-size:22px;color:#fff}
    .header-txt h1{font-size:16px;font-weight:600;color:#fff}
    .header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}

    .live-badge {
      margin-left:auto;
      display:flex;align-items:center;gap:6px;
      background:var(--teal-glow);
      border:0.5px solid var(--teal-b);
      border-radius:20px;padding:4px 12px;
      font-size:12px;color:var(--teal);font-weight:500;
      flex-shrink:0;
    }

    .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    
    .body{padding:2rem}

    /* ── Input Group ───────────────────────────────────────── */
    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 2rem;
    }

    input[type="tel"] {
      flex: 1;
      padding: 0.8rem 1.2rem;
      background-color: #090d16;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input[type="tel"]:focus {
      outline: none;
      border-color: var(--teal);
    }

    button.run-btn {
      padding: 0.8rem 1.6rem;
      background-color: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    button.run-btn:hover { opacity: 0.9; }
    button.run-btn:disabled { background-color: var(--card2); color: var(--txt3); cursor: not-allowed; }

    /* ── Main status display ─────────────────────────────────── */
    .status-display {
      border-radius: 14px;
      border: 0.5px solid var(--border);
      background: var(--card2);
      overflow: hidden;
      display: none; /* Controlled by JS */
      transition: border-color 0.4s ease;
    }

    .status-display.loading{ border-color:var(--teal-b); display: block; }
    .status-display.clean  { border-color:var(--green-b); display: block; animation:greenPulse 2s ease forwards; }
    .status-display.bad    { border-color:var(--red-b);   display: block; animation:redPulse 2s ease forwards; }
    .status-display.invalid{ border-color:var(--red-b);   display: block; animation:redPulse 2s ease forwards; }

    @keyframes greenPulse{  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}  50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)}  100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)}}
    @keyframes redPulse{  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}  50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)}  100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)}}

    /* ── Hero section ─────────────────────────────────────────── */
    .status-hero {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2.2rem 1.5rem 1.6rem;
      transition: background 0.5s ease;
      gap: 0;
    }
    .loading .status-hero { background:var(--card2); }
    .clean   .status-hero { background:var(--green-glow); }
    .bad     .status-hero { background:var(--red-glow); }
    .invalid .status-hero { background:var(--red-glow); }

    .status-icon {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      transition: background 0.4s;
    }
    .loading .status-icon { background:var(--teal-glow) }
    .loading .status-icon i { font-size:36px; color:var(--teal); animation:spin 0.8s linear infinite }
    .clean   .status-icon { background:rgba(34,197,94,0.2) }
    .clean   .status-icon i { font-size:36px; color:var(--green) }
    .bad     .status-icon { background:rgba(239,68,68,0.2) }
    .bad     .status-icon i { font-size:36px; color:var(--red) }
    .invalid .status-icon { background:rgba(239,68,68,0.2) }
    .invalid .status-icon i { font-size:36px; color:var(--red) }
    @keyframes spin{to{transform:rotate(360deg)}}

    .status-number {
      font-family: 'DM Mono', monospace;
      font-size: 20px; font-weight: 500;
      letter-spacing: .06em;
      margin-bottom: .5rem;
      transition: color 0.4s;
    }
    .loading .status-number { color:var(--txt2) }
    .clean   .status-number { color:var(--green) }
    .bad     .status-number { color:var(--red) }
    .invalid .status-number { color:var(--red) }

    .status-verdict {
      font-size: 26px; font-weight: 700; letter-spacing: .02em;
      transition: color 0.4s;
    }
    .loading .status-verdict { color:var(--txt2); font-size:15px; font-weight:400 }
    .clean   .status-verdict { color:var(--green) }
    .bad     .status-verdict { color:var(--red) }
    .invalid .status-verdict { color:var(--red); font-size:18px }

    /* ── API Message pill ─────────────────────────────────── */
    .api-message-pill {
      display: none;
      margin-top: 10px;
      align-items: center; gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase;
      border: 0.5px solid;
      animation: fadeUp 0.35s ease forwards;
    }
    .api-message-pill.visible { display: inline-flex; }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

    .api-message-pill.pill-red   { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.4); color:var(--red); }
    .api-message-pill.pill-green { background:rgba(34,197,94,0.1);  border-color:rgba(34,197,94,0.4); color:var(--green); }

    /* ── Flags grid ─────────────────────────────────────────── */
    .flags-section {
      padding: 0 1.2rem 1.4rem;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .flags-section.visible { display: flex; }

    .flags-label {
      font-size: 10px; font-weight: 600; letter-spacing: .1em;
      color: var(--txt3); text-transform: uppercase;
      padding: 0 2px; margin-bottom: 2px;
    }

    .flag-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 0.5px solid;
      animation: flagIn 0.3s ease forwards;
    }
    @keyframes flagIn{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    
    .flag-row i { font-size:17px; flex-shrink:0; margin-top:1px; }
    .flag-row .flag-name { font-size:13px; font-weight:600; }
    .flag-row .flag-desc { font-size:11px; color:var(--txt2); line-height:1.35; margin-top:2px }

    .flag-code-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 5px; padding: 2px 8px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
      background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.12);
      color: var(--txt2);
    }
    .flag-code-badge i { font-size: 11px; }

    .flag-critical { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.35); }
    .flag-critical i, .flag-critical .flag-name { color:var(--red) }
    .flag-clean { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.3); }
    .flag-clean i, .flag-clean .flag-name { color:var(--green) }

    /* ── Raw data accordion ──────────────────────────────────── */
    .raw-toggle {
      display: none; align-items: center; gap: 6px;
      background: transparent; border: none; border-top: 0.5px solid var(--border);
      width: 100%; padding: 9px 16px;
      color: var(--txt3); font-size: 11px; font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .raw-toggle.visible { display: flex; }
    .raw-toggle:hover { color: var(--txt2); }
    .raw-toggle i { font-size: 14px; }
    .raw-toggle span { margin-left: auto; font-size: 10px; letter-spacing: .05em; }

    .raw-body { display: none; padding: 12px 16px; border-top: 0.5px solid var(--border); background: var(--bg); }
    .raw-body.open { display: block; }
    .raw-body pre {
      font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--txt2);
      white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    }

    @media(max-width:480px){ .body{padding:1.25rem} .header{padding:1.25rem} }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo"><i class="ti ti-shield-check"></i></div>
    <div class="header-txt">
      <h1>DNC Checker</h1>
      <p>Vocal Tech Marketing · Compliance Portal</p>
    </div>
    <div class="live-badge"><div class="dot"></div>Live call</div>
  </div>

  <div class="body">
    <div class="input-container">
      <input type="tel" id="phoneNumber" placeholder="Enter phone number..." autocomplete="off">
      <button id="runBtn" class="run-btn" onclick="executeLookup()">
        <i class="ti ti-search"></i> Check Number
      </button>
    </div>

    <div class="status-display" id="statusDisplay">
      <div class="status-hero">
        <div class="status-icon"><i class="ti ti-loader-2" id="statusIcon"></i></div>
        <div class="status-number" id="statusNumber">—</div>
        <div class="status-verdict" id="statusVerdict">Scanning...</div>
        <div class="api-message-pill" id="apiMessagePill">
          <i class="ti ti-tag"></i>
          <span id="apiMessageText"></span>
        </div>
      </div>

      <div class="flags-section" id="flagsSection">
        <div class="flags-label">Detected Status</div>
        <div id="flagsList"></div>
      </div>

      <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()">
        <i class="ti ti-code"></i> Raw API Response
        <span id="rawArrow">▼ SHOW</span>
      </button>
      <div class="raw-body" id="rawBody">
        <pre id="rawJson"></pre>
      </div>
    </div>
  </div>
</div>

<script>
  // ── PASTE YOUR EXACT GOOGLE APPS SCRIPT WEB APP ENDPOINT DEPLOYMENT URL HERE:
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8j6erDfX9E6j8Y03uv4JdLzLykAYY4dzvYJRj94QEl4LBBSR0uc2THu_sTXg97n5wIw/exec';

  const VERDICT_MAP = {
    'none': { isClean: true, name: 'No Records Found', desc: 'Not listed on any blacklist, DNC, litigator, or complaint registry.', icon: 'ti-shield-check' },
    'federal-dnc': { isClean: false, name: 'Federal DNC Match', desc: 'Registered on the National Do Not Call Registry (FTC). Do not contact.', icon: 'ti-building-government' },
    'litigator': { isClean: false, name: 'TCPA Litigator Threat', desc: 'Known serial plaintiff or class-action attorney. CRITICAL risk.', icon: 'ti-gavel' },
    'screamer': { isClean: false, name: 'Hostile Screamer', desc: 'Known hostile caller prone to aggressive responses or verbal harassment.', icon: 'ti-speakerphone' },
    'complainer': { isClean: false, name: 'DNC Complainer Registry', desc: 'Has filed formal complaints with regulatory bodies. High legal risk.', icon: 'ti-message-report' },
    'dnc': { isClean: false, name: 'DNC Record Found', desc: 'Listed on active Do Not Call registries.', icon: 'ti-phone-x' },
    'state': { isClean: false, name: 'State DNC Registry', desc: 'Listed on a restricted State Do Not Call list.', icon: 'ti-map-pin-off' },
    'internal': { isClean: false, name: 'Internal DNC Flag', desc: 'Flagged directly on your internal company suppression files.', icon: 'ti-database-x' },
    'reassigned': { isClean: false, name: 'Reassigned Number Warning', desc: 'Number has changed owners. Active consent requires confirmation.', icon: 'ti-arrows-exchange' }
  };

  let rawOpen = false;
  function toggleRaw(){
    rawOpen = !rawOpen;
    document.getElementById('rawBody').classList.toggle('open', rawOpen);
    document.getElementById('rawArrow').textContent = rawOpen ? '▲ HIDE' : '▼ SHOW';
  }

  function formatPhone(d) {
    d = d.replace(/\D/g,'');
    if(d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    if(d.length === 11 && d[0]==='1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    return d;
  }

  async function executeLookup() {
    const input = document.getElementById('phoneNumber');
    const btn = document.getElementById('runBtn');
    
    const display = document.getElementById('statusDisplay');
    const icon = document.getElementById('statusIcon');
    const numEl = document.getElementById('statusNumber');
    const verdict = document.getElementById('statusVerdict');
    const pill = document.getElementById('apiMessagePill');
    const pillText = document.getElementById('apiMessageText');
    const section = document.getElementById('flagsSection');
    const list = document.getElementById('flagsList');
    const rawToggle = document.getElementById('rawToggle');
    const rawJson = document.getElementById('rawJson');

    const phoneVal = input.value.trim();
    if(!phoneVal) return alert('Please enter a phone number.');

    const cleanNum = phoneVal.replace(/\D/g,'');
    if(cleanNum.length < 7 || cleanNum.length > 15) {
      alert('Invalid phone syntax.');
      return;
    }

    // Enter Loading State
    btn.disabled = true;
    display.className = 'status-display loading';
    icon.className = 'ti ti-loader-2';
    numEl.textContent = formatPhone(cleanNum);
    verdict.textContent = 'Scanning database...';
    pill.classList.remove('visible');
    section.classList.remove('visible');
    rawToggle.classList.remove('visible');

    try {
      const targetUrl = `${WEB_APP_URL}?phone=${encodeURIComponent(cleanNum)}`;
      const response = await fetch(targetUrl, { method: 'GET' });
      const data = await response.json();

      if (data.status === 'error') {
        throw new Error(data.message);
      }

      // Display and raw processing
      rawJson.textContent = JSON.stringify(data.raw, null, 2);
      rawToggle.classList.add('visible');

      const rawCode = (data.code || 'none').toLowerCase();
      const rawMsg = data.message || '';

      const config = VERDICT_MAP[rawCode] || {
        isClean: false,
        name: rawMsg || 'Database Match',
        desc: `Identified dynamic record with internal API label matching code: ${rawCode}.`,
        icon: 'ti-alert-triangle'
      };

      pillText.textContent = rawMsg;
      section.classList.add('visible');

      // Binary Decision Display matching layout rules
      if (rawCode === 'none' || rawMsg.toLowerCase() === 'good') {
        display.className = 'status-display clean';
        icon.className = 'ti ti-circle-check';
        verdict.textContent = 'CLEAN';
        pill.className = 'api-message-pill visible pill-green';
        list.innerHTML = `
          <div class="flag-row flag-clean">
            <i class="ti ${config.icon}"></i>
            <div style="flex:1">
              <div class="flag-name">${config.name}</div>
              <div class="flag-desc">${config.desc}</div>
              <div class="flag-code-badge">
                <i class="ti ti-tag"></i> API code: <strong>${rawCode}</strong>
              </div>
            </div>
          </div>`;
      } else {
        display.className = 'status-display bad';
        icon.className = 'ti ti-ban';
        verdict.textContent = 'DO NOT TRANSFER';
        pill.className = 'api-message-pill visible pill-red';
        list.innerHTML = `
          <div class="flag-row flag-critical">
            <i class="ti ${config.icon}"></i>
            <div style="flex:1">
              <div class
