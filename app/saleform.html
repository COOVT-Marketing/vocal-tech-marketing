<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sale Form</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root {
      --bg:          #0b0f19;
      --card:        #111827;
      --card2:       #1f2937;
      --border:      #374151;
      --border2:     #4b5563;
      --txt:         #f9fafb;
      --txt2:        #9ca3af;
      --txt3:        #6b7280;
      --teal:        #1a9e75;
      --teal-glow:   rgba(26,158,117,0.15);
      --teal-b:      rgba(26,158,117,0.35);
      --green:       #22c55e;
      --green-glow:  rgba(34,197,94,0.12);
      --green-b:     rgba(34,197,94,0.4);
      --red:         #ef4444;
      --red-glow:    rgba(239,68,68,0.12);
      --red-b:       rgba(239,68,68,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }

    /* NO CALL SCREEN */
    .no-call-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 70vh; text-align: center; gap: 16px;
    }
    .no-call-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--card); border: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .no-call-icon i { font-size: 32px; color: var(--txt2); }
    .no-call-screen h2 { font-size: 18px; font-weight: 500; }

    /* CARD */
    .vtm-card {
      background: var(--card); border: 0.5px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 580px;
      margin: 0 auto; overflow: hidden;
      box-shadow: 0 25px 30px -8px rgba(0,0,0,0.6);
    }

    /* HEADER */
    .vtm-header {
      background: #090d16; padding: 1.4rem 2rem;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .vtm-logo {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .vtm-logo.teal { background: var(--teal); }
    .vtm-logo i { font-size: 22px; color: #fff; }
    .vtm-header-txt h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .vtm-header-txt p  { font-size: 12px; color: var(--txt2); margin-top: 2px; }
    .live-badge {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      background: var(--teal-glow); border: 0.5px solid var(--teal-b);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; color: var(--teal); font-weight: 500;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── TRANSFER GATE SCREEN ── */
    .transfer-gate {
      padding: 2.5rem 2rem;
      display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 22px;
    }
    .transfer-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--teal-glow); border: 0.5px solid var(--teal-b);
      display: flex; align-items: center; justify-content: center;
    }
    .transfer-ring i { font-size: 38px; color: var(--teal); }
    .transfer-title {
      font-size: 24px; font-weight: 600; color: var(--txt); line-height: 1.2;
    }
    .transfer-title span { color: var(--teal); }
    .transfer-sub {
      font-size: 13px; color: var(--txt2); line-height: 1.6;
      max-width: 300px; margin: 10px auto 0;
    }
    .caller-pill {
      display: flex; align-items: center; gap: 12px;
      background: var(--card2); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 12px 18px; width: 100%; max-width: 340px;
    }
    .caller-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--teal-glow); border: 0.5px solid var(--teal-b);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--teal); flex-shrink: 0;
    }
    .caller-info { text-align: left; }
    .caller-info .cname  { font-size: 15px; font-weight: 500; color: var(--txt); }
    .caller-info .cphone { font-size: 12px; color: var(--txt2); font-family: 'DM Mono', monospace; margin-top: 2px; }
    .btn-fill-form {
      width: 100%; max-width: 340px;
      padding: 13px 20px; background: var(--teal); color: #fff;
      border: none; border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, transform .1s;
    }
    .btn-fill-form:hover  { background: #147d5c; }
    .btn-fill-form:active { transform: scale(.98); }
    .btn-fill-form i { font-size: 19px; }

    /* FORM BODY */
    .sale-form-inner { padding: 2rem; }

    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: var(--teal); text-transform: uppercase;
      margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
      margin-top: 1.5rem;
    }
    .section-label:first-of-type { margin-top: 0; }
    .section-label::after { content:''; flex:1; height:.5px; background: var(--border); }

    .field-grid      { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field-grid.full { grid-template-columns: 1fr; }
    .field-group     { display: flex; flex-direction: column; gap: 5px; }

    label { font-size: 12px; font-weight: 500; color: var(--txt2); }

    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: var(--txt2); pointer-events: none;
    }
    .input-wrap input,
    .input-wrap select {
      width: 100%; padding: 9px 12px 9px 34px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: var(--card2); border: 0.5px solid var(--border);
      border-radius: 8px; color: var(--txt);
      transition: border-color .15s, box-shadow .15s; appearance: none;
    }
    .input-wrap select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 12px center; background-size: 14px;
      padding-right: 32px;
    }
    .input-wrap input:focus,
    .input-wrap select:focus {
      outline: none; border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }
    .input-wrap input.auto-filled,
    .input-wrap select.auto-filled {
      border-color: rgba(26,158,117,.6);
      background: rgba(26,158,117,.06);
    }

    .textarea-wrap { position: relative; }
    .textarea-wrap i {
      position: absolute; left: 11px; top: 12px;
      font-size: 16px; color: var(--txt2); pointer-events: none;
    }
    textarea {
      width: 100%; padding: 10px 12px 10px 34px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: var(--card2); border: 0.5px solid var(--border);
      border-radius: 8px; color: var(--txt);
      resize: vertical; min-height: 90px;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus {
      outline: none; border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    /* BUTTONS */
    .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; }
    .btn-primary {
      flex: 1; padding: 11px 20px; background: var(--teal); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, transform .1s;
    }
    .btn-primary:hover  { background: #147d5c; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      padding: 11px 16px; background: transparent; color: var(--txt2);
      border: 0.5px solid var(--border2); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .15s, color .15s;
    }
    .btn-secondary:hover { background: var(--card2); color: var(--txt); }

    /* TOASTS */
    .error-toast {
      display: none; align-items: center; gap: 10px;
      background: rgba(239,68,68,.1); border: 0.5px solid rgba(239,68,68,.3);
      border-radius: 8px; padding: 12px 16px; margin-top: 1rem;
      font-size: 13px; color: #f87171;
    }
    .error-toast i { font-size: 18px; }

    /* FOOTER */
    .vtm-footer {
      border-top: 0.5px solid var(--border);
      background: #090d16; padding: 12px 2rem;
      display: flex; align-items: center; gap: 8px;
    }
    .vtm-footer span { font-size: 11px; color: var(--txt2); font-family: 'DM Mono', monospace; }
    .url-pill {
      margin-left: auto; font-size: 11px; color: var(--teal);
      font-family: 'DM Mono', monospace; background: rgba(26,158,117,.12);
      padding: 3px 10px; border-radius: 20px; border: 0.5px solid rgba(26,158,117,.3);
    }

    /* SUCCESS MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      z-index: 999; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--card); border: 0.5px solid rgba(34,197,94,0.4);
      border-radius: 20px; padding: 2.5rem 2rem;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 0 60px rgba(34,197,94,0.15), 0 25px 40px rgba(0,0,0,0.6);
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(34,197,94,0.15); border: 0.5px solid rgba(34,197,94,0.4);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-icon i { font-size: 38px; color: var(--green); }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--txt); margin-bottom: .5rem; }
    .modal-sub   { font-size: 13px; color: var(--txt2); line-height: 1.6; margin-bottom: 1.75rem; }
    .modal-close {
      width: 100%; padding: 11px; background: var(--teal); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .modal-close:hover { background: #147d5c; }

    /* OPEN PING INDICATOR */
    .open-ping-bar {
      background: rgba(26,158,117,0.08);
      border-bottom: 0.5px solid rgba(26,158,117,0.2);
      padding: 8px 2rem;
      font-size: 11px; color: var(--teal);
      font-family: 'DM Mono', monospace;
      display: flex; align-items: center; gap: 6px;
    }
    .open-ping-bar i { font-size: 13px; }

    @media (max-width: 480px) {
      .sale-form-inner { padding: 1.25rem; }
      .vtm-header { padding: 1.25rem; }
      .field-grid { grid-template-columns: 1fr; }
      .transfer-gate { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcLMfk8rNoFGTgQld8QOaAziJ1sE_Abk0sqrNmC3-fIVqpJDQQPpt8dLL0mnRnm8UY/exec';

const COMPANY_MAP = {
  'CAMPAIGN_A': 'Vocal Tech',
  'CAMPAIGN_B': 'Echolink',
  'DEFAULT':    ''
};

const US_STATES = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID",
  "IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE",
  "NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN",
  "TX","UT","VT","VA","WA","WV","WI","WY"];

const ALIASES = {
  agentName: ['fullname','agentName','agent_name','agent','user'],
  phone:     ['phone','phone_number','phonenumber','phone_code'],
  first:     ['first','first_name','fname'],
  last:      ['last','last_name','lname'],
  age:       ['age'],
  state:     ['state'],
  zip:       ['zip','postal','postal_code','zipcode'],
  dob:       ['dob','birthdate','d_o_b'],
  company:   ['company','vendor'],
  campaign:  ['campaign','campaign_id'],
  did:       ['did','did_id','inbound_number'],
  comments:  ['comments','notes','comment'],
};

function getParam(name) {
  const params = new URLSearchParams(window.location.search);
  for (const k of (ALIASES[name] || [name])) {
    const v = params.get(k);
    if (v && v.trim()) return v.trim();
  }
  return '';
}

function isLiveCall() {
  const params = new URLSearchParams(window.location.search);
  return ['phone','phone_number','phonenumber','first','first_name',
          'last','last_name','campaign','company'].some(p => params.get(p));
}

let cachedIP = '';
fetch('https://api.ipify.org?format=json')
  .then(r => r.json())
  .then(d => { cachedIP = d.ip || ''; })
  .catch(() => {});

/* ── BOOT ── */
function boot() {
  if (!isLiveCall()) { renderNoCall(); return; }
  renderTransferGate();
  setTimeout(pingWebformOpen, 800);
}

/* ── NO CALL ── */
function renderNoCall() {
  document.getElementById('app').innerHTML = `
    <div class="no-call-screen">
      <div class="no-call-icon"><i class="ti ti-phone-off"></i></div>
      <h2>No webform found</h2>
    </div>`;
}

/* ── TRANSFER GATE ── */
function renderTransferGate() {
  const first   = getParam('first');
  const last    = getParam('last');
  const phone   = getParam('phone');
  const fullName = [first, last].filter(Boolean).join(' ') || 'Customer';

  // Build initials for avatar
  const initials = [first, last]
    .filter(Boolean)
    .map(n => n[0].toUpperCase())
    .join('') || '?';

  // Format phone nicely if 10 digits
  let phoneDisplay = phone;
  if (/^\d{10}$/.test(phone)) {
    phoneDisplay = `(${phone.slice(0,3)}) ${phone.slice(3,6)}-${phone.slice(6)}`;
  }

  document.getElementById('app').innerHTML = `
    <div class="vtm-card">
      <div class="vtm-header">
        <div class="vtm-logo teal"><i class="ti ti-clipboard-text"></i></div>
        <div class="vtm-header-txt">
          <h1>Sale Form</h1>
        </div>
        <div class="live-badge"><div class="live-dot"></div>Live call</div>
      </div>

      <div class="transfer-gate">
        <div class="transfer-ring">
          <i class="ti ti-phone-incoming"></i>
        </div>

        <div>
          <div class="transfer-title">You can <span>transfer now!</span></div>
          <p class="transfer-sub">Fill out the sale form after the buffer is complete.</p>
        </div>

        <div class="caller-pill">
          <div class="caller-avatar">${initials}</div>
          <div class="caller-info">
            <div class="cname">${fullName}</div>
            ${phoneDisplay ? `<div class="cphone">${phoneDisplay}</div>` : ''}
          </div>
        </div>

        <button class="btn-fill-form" onclick="openSaleForm()">
          <i class="ti ti-clipboard-text"></i>
          Fill the Sale Form
        </button>
      </div>

      <div class="vtm-footer">
        <span>sale-form · vtm</span>
      </div>
    </div>`;
}

/* ── OPEN SALE FORM (on button click) ── */
function openSaleForm() {
  renderPage();
}

/* ── PING: WEBFORM OPENED ── */
function pingWebformOpen() {
  const pingBar = document.getElementById('pingBar');
  if (pingBar) pingBar.style.display = 'flex';

  const payload = {
    type:      'open',
    phone:     getParam('phone'),
    first:     getParam('first'),
    last:      getParam('last'),
    agentName: getParam('agentName'),
    campaign:  getParam('campaign'),
    company:   getParam('company') || COMPANY_MAP[getParam('campaign')] || '',
    did:       getParam('did'),
    state:     getParam('state'),
    age:       getParam('age'),
    ip:        cachedIP,
  };

  fetch(APPS_SCRIPT_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  })
  .then(() => {
    const icon = document.getElementById('pingIcon');
    const text = document.getElementById('pingText');
    if (icon) { icon.className = 'ti ti-circle-check'; icon.style.animation = ''; }
    if (text) text.textContent = 'Session logged';
    setTimeout(() => { if (pingBar) pingBar.style.display = 'none'; }, 2000);
  })
  .catch(() => {
    if (pingBar) pingBar.style.display = 'none';
  });
}

/* ── RENDER FULL FORM ── */
function renderPage() {
  const phone         = getParam('phone');
  const campaignParam = getParam('campaign');
  const urlCompany    = getParam('company');
  const company       = urlCompany || COMPANY_MAP[campaignParam] || COMPANY_MAP['DEFAULT'];
  const stateOptions  = US_STATES.map(s => `<option>${s}</option>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="vtm-card">

      <div class="vtm-header">
        <div class="vtm-logo teal"><i class="ti ti-clipboard-text"></i></div>
        <div class="vtm-header-txt">
          <h1>Sale Form</h1>
        </div>
        <div class="live-badge"><div class="live-dot"></div>Live call</div>
      </div>

      <div class="open-ping-bar" id="pingBar" style="display:none">
        <i class="ti ti-loader" id="pingIcon" style="animation:spin .8s linear infinite"></i>
        <span id="pingText">Logging session…</span>
      </div>

      <div class="sale-form-inner">

        <input type="hidden" id="campaign" />
        <input type="hidden" id="company"  value="${company}" />
        <input type="hidden" id="zip" />
        <input type="hidden" id="dob" />

        <div class="section-label">Agent Information</div>
        <div class="field-grid full">
          <div class="field-group">
            <label for="agentName">Agent Name</label>
            <div class="input-wrap"><i class="ti ti-id"></i>
              <input type="text" id="agentName" placeholder="Agent Name / ID" />
            </div>
          </div>
        </div>
        <div class="field-grid full">
          <div class="field-group">
            <label for="did">DID</label>
            <div class="input-wrap"><i class="ti ti-hash"></i>
              <input type="text" id="did" placeholder="e.g. D1" />
            </div>
          </div>
        </div>

        <div class="section-label">Customer Information</div>
        <div class="field-grid">
          <div class="field-group">
            <label for="firstName">First name</label>
            <div class="input-wrap"><i class="ti ti-user"></i>
              <input type="text" id="firstName" placeholder="First name" />
            </div>
          </div>
          <div class="field-group">
            <label for="lastName">Last name</label>
            <div class="input-wrap"><i class="ti ti-user"></i>
              <input type="text" id="lastName" placeholder="Last name" />
            </div>
          </div>
        </div>
        <div class="field-grid">
          <div class="field-group">
            <label for="phone">Phone number</label>
            <div class="input-wrap"><i class="ti ti-phone"></i>
              <input type="tel" id="phone" placeholder="10-digit number" />
            </div>
          </div>
          <div class="field-group">
            <label for="state">State</label>
            <div class="input-wrap"><i class="ti ti-map-pin"></i>
              <select id="state"><option value="">Select state</option>${stateOptions}</select>
            </div>
          </div>
        </div>
        <div class="field-grid full">
          <div class="field-group">
            <label for="age">Age</label>
            <div class="input-wrap"><i class="ti ti-calendar-event"></i>
              <input type="number" id="age" placeholder="Age" min="0" max="120" />
            </div>
          </div>
        </div>

        <div class="section-label">Agent Notes</div>
        <div class="field-group" style="margin-bottom:0">
          <label for="comments">Comments</label>
          <div class="textarea-wrap"><i class="ti ti-notes"></i>
            <textarea id="comments" placeholder="Comments…"></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-secondary" onclick="clearForm()">
            <i class="ti ti-refresh"></i> Clear
          </button>
          <button class="btn-primary" id="submitBtn" onclick="submitSale()">
            <i class="ti ti-device-floppy"></i> Submit Sale
          </button>
        </div>

        <div class="error-toast" id="errorToast">
          <i class="ti ti-alert-circle"></i> Submission failed. Check your connection and try again.
        </div>

      </div>
    </div>`;

  autoFill('agentName', getParam('agentName'));
  autoFill('phone',     phone);
  autoFill('firstName', getParam('first'));
  autoFill('lastName',  getParam('last'));
  autoFill('age',       getParam('age'));
  autoFill('zip',       getParam('zip'));
  autoFill('dob',       getParam('dob'));
  autoFill('campaign',  campaignParam);
  autoFill('did',       getParam('did'));
  autoFill('comments',  getParam('comments'));
  setStateByValue(getParam('state'));
}

/* ── FORM HELPERS ── */
function autoFill(id, value) {
  const el = document.getElementById(id);
  if (!el || !value) return;
  el.value = value;
  if (el.type !== 'hidden') el.classList.add('auto-filled');
}

function setStateByValue(value) {
  if (!value) return;
  const sel = document.getElementById('state');
  if (!sel) return;
  for (const opt of sel.options) {
    if (opt.value.toLowerCase() === value.toLowerCase()) {
      sel.value = opt.value;
      sel.classList.add('auto-filled');
      break;
    }
  }
}

function clearForm() {
  ['agentName','firstName','lastName','phone','age','state',
   'zip','dob','company','campaign','did','comments'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('auto-filled'); }
  });
  document.getElementById('errorToast').style.display = 'none';
}

/* ── SUBMIT SALE ── */
function submitSale() {
  const btn        = document.getElementById('submitBtn');
  const errorToast = document.getElementById('errorToast');
  errorToast.style.display = 'none';

  btn.innerHTML = '<i class="ti ti-loader"></i> Submitting…';
  btn.disabled  = true;

  const payload = {
    type:      'sale',
    agentName: document.getElementById('agentName').value,
    phone:     document.getElementById('phone').value,
    firstName: document.getElementById('firstName').value,
    lastName:  document.getElementById('lastName').value,
    age:       document.getElementById('age').value,
    state:     document.getElementById('state').value,
    zip:       document.getElementById('zip').value,
    dob:       document.getElementById('dob').value,
    company:   document.getElementById('company').value,
    campaign:  document.getElementById('campaign').value,
    did:       document.getElementById('did').value,
    comments:  document.getElementById('comments').value,
    ip:        cachedIP,
  };

  fetch(APPS_SCRIPT_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  })
  .then(() => {
    window.history.replaceState({}, '', window.location.pathname);
    document.body.insertAdjacentHTML('beforeend', `
      <div class="modal-overlay show" id="successModal">
        <div class="modal-box">
          <div class="modal-icon"><i class="ti ti-circle-check"></i></div>
          <h2 class="modal-title">Sale Submitted</h2>
          <p class="modal-sub">Successfully logged to the ${payload.company || 'Sales'} sheet.</p>
          <button class="modal-close" onclick="closeAndExit()">Okay</button>
        </div>
      </div>`);
  })
  .catch(() => {
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Submit Sale';
    btn.disabled  = false;
    errorToast.style.display = 'flex';
  });
}

function closeAndExit() {
  const m = document.getElementById('successModal');
  if (m) m.remove();
  renderNoCall();
}

boot();
</script>
</body>
</html>
