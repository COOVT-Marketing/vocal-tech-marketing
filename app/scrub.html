<!DOCTYPE html>
<html lang="en">
<head>
  <title>VTM DNC Portal</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="http://vocaltechmarketing.com/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root {
      --bg:        #0b0f19;
      --card:      #111827;
      --card2:     #1f2937;
      --border:    #374151;
      --txt:       #f9fafb;
      --txt2:      #9ca3af;
      --txt3:      #6b7280;
      --teal:      #1a9e75;
      --teal-glow: rgba(26,158,117,0.15);
      --teal-b:    rgba(26,158,117,0.35);
      --green:     #22c55e;
      --green-glow:rgba(34,197,94,0.12);
      --green-b:   rgba(34,197,94,0.4);
      --red:       #ef4444;
      --red-glow:  rgba(239,68,68,0.12);
      --red-b:     rgba(239,68,68,0.4);
      --yellow:    #f59e0b;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--txt);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;
    }

    .card {
      background:var(--card);
      border:0.5px solid var(--border);
      border-radius:16px;
      width:100%;max-width:580px;
      overflow:hidden;
      box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
    }

    .header {
      background:#090d16;
      padding:1.4rem 2rem;
      display:flex;align-items:center;gap:14px;
      border-bottom:0.5px solid var(--border);
    }

    .logo {
      width:40px;height:40px;
      border-radius:10px;
      overflow:hidden;
      flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .logo img { width:40px; height:40px; object-fit:contain; border-radius:10px; }

    .header-txt h1{font-size:16px;font-weight:600;color:#fff}
    .header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}

    .company-badge {
      margin-left:auto;
      display:flex; align-items:center; gap:6px;
      background:var(--teal-glow);
      border:0.5px solid var(--teal-b);
      border-radius:20px; padding:4px 12px;
      font-size:12px; color:var(--teal); font-weight:500;
      flex-shrink:0;
      max-width:180px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .body{padding:2rem}

    .input-container {
      display:flex;
      gap:10px;
      margin-bottom:2rem;
    }

    input[type="tel"] {
      flex:1;
      padding:0.8rem 1.2rem;
      background-color:#090d16;
      border:0.5px solid var(--border);
      border-radius:10px;
      color:#fff;
      font-size:15px;
      transition:border-color 0.2s;
    }
    input[type="tel"]:focus { outline:none; border-color:var(--teal); }

    button.run-btn {
      padding:0.8rem 1.6rem;
      background-color:var(--teal);
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:opacity 0.2s;
    }
    button.run-btn:hover { opacity:0.9; }
    button.run-btn:disabled { background-color:var(--card2); color:var(--txt3); cursor:not-allowed; }

    /* ── Sources row ─────────────────────────────────────────── */
    .sources-row {
      display:none;
      gap:8px;
      margin-bottom:1.2rem;
    }
    .sources-row.visible { display:flex; }

    .source-pill {
      flex:1;
      display:flex; align-items:center; gap:7px;
      padding:8px 12px;
      border-radius:8px;
      border:0.5px solid var(--border);
      background:var(--card2);
      font-size:12px;
      font-weight:500;
      color:var(--txt2);
      transition:all 0.3s;
    }
    .source-pill i { font-size:15px; }
    .source-pill .pill-label { flex:1; }
    .source-pill .pill-status { font-size:11px; font-family:'DM Mono',monospace; }

    .source-pill.loading  { border-color:var(--teal-b);  color:var(--txt2); }
    .source-pill.loading i { color:var(--teal); animation:spin 0.8s linear infinite; }
    .source-pill.ok       { border-color:var(--green-b); background:rgba(34,197,94,0.06); color:var(--green); }
    .source-pill.ok i     { color:var(--green); }
    .source-pill.bad      { border-color:var(--red-b);   background:rgba(239,68,68,0.06); color:var(--red); }
    .source-pill.bad i    { color:var(--red); }
    .source-pill.warn     { border-color:rgba(245,158,11,0.4); background:rgba(245,158,11,0.06); color:var(--yellow); }
    .source-pill.warn i   { color:var(--yellow); }
    .source-pill.err      { border-color:var(--border); color:var(--txt3); }

    /* ── Main verdict card ───────────────────────────────────── */
    .status-display {
      border-radius:14px;
      border:0.5px solid var(--border);
      background:var(--card2);
      overflow:hidden;
      display:none;
      transition:border-color 0.4s ease;
    }
    .status-display.loading{ border-color:var(--teal-b); display:block; }
    .status-display.clean  { border-color:var(--green-b); display:block; animation:greenPulse 2s ease forwards; }
    .status-display.bad    { border-color:var(--red-b);   display:block; animation:redPulse 2s ease forwards; }
    .status-display.invalid{ border-color:var(--red-b);   display:block; animation:redPulse 2s ease forwards; }

    @keyframes greenPulse{ 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)} 100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)} }
    @keyframes redPulse{   0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)} 100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)} }

    .status-hero {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:2.2rem 1.5rem 1.6rem;
      transition:background 0.5s ease;
    }
    .loading .status-hero { background:var(--card2); }
    .clean   .status-hero { background:var(--green-glow); }
    .bad     .status-hero { background:var(--red-glow); }
    .invalid .status-hero { background:var(--red-glow); }

    .status-icon {
      width:72px; height:72px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:1rem;
    }
    .loading .status-icon { background:var(--teal-glow) }
    .loading .status-icon i { font-size:36px; color:var(--teal); animation:spin 0.8s linear infinite }
    .clean   .status-icon { background:rgba(34,197,94,0.2) }
    .clean   .status-icon i { font-size:36px; color:var(--green) }
    .bad     .status-icon { background:rgba(239,68,68,0.2) }
    .bad     .status-icon i { font-size:36px; color:var(--red) }
    .invalid .status-icon { background:rgba(239,68,68,0.2) }
    .invalid .status-icon i { font-size:36px; color:var(--red) }
    @keyframes spin{to{transform:rotate(360deg)}}
