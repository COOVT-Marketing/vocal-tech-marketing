<!DOCTYPE html>
<html lang="en">
<head>
  <title>VTM DNC Portal</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="http://vocaltechmarketing.com/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root {
      --bg:        #0b0f19;
      --card:      #111827;
      --card2:     #1f2937;
      --border:    #374151;
      --txt:       #f9fafb;
      --txt2:      #9ca3af;
      --txt3:      #6b7280;
      --teal:      #1a9e75;
      --teal-glow: rgba(26,158,117,0.15);
      --teal-b:    rgba(26,158,117,0.35);
      --green:     #22c55e;
      --green-glow:rgba(34,197,94,0.12);
      --green-b:   rgba(34,197,94,0.4);
      --red:       #ef4444;
      --red-glow:  rgba(239,68,68,0.12);
      --red-b:     rgba(239,68,68,0.4);
      --yellow:    #f59e0b;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--txt);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;
    }

    .card {
      background:var(--card);
      border:0.5px solid var(--border);
      border-radius:16px;
      width:100%;max-width:580px;
      overflow:hidden;
      box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
    }

    .header {
      background:#090d16;
      padding:1.4rem 2rem;
      display:flex;align-items:center;gap:14px;
      border-bottom:0.5px solid var(--border);
    }

    .logo {
      width:40px;height:40px;
      border-radius:10px;
      overflow:hidden;
      flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .logo img { width:40px; height:40px; object-fit:contain; border-radius:10px; }

    .header-txt h1{font-size:16px;font-weight:600;color:#fff}
    .header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}

    .company-badge {
      margin-left:auto;
      display:flex; align-items:center; gap:6px;
      background:var(--teal-glow);
      border:0.5px solid var(--teal-b);
      border-radius:20px; padding:4px 12px;
      font-size:12px; color:var(--teal); font-weight:500;
      flex-shrink:0;
      max-width:180px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .body{padding:2rem}

    .input-container {
      display:flex;
      gap:10px;
      margin-bottom:2rem;
    }

    input[type="tel"] {
      flex:1;
      padding:0.8rem 1.2rem;
      background-color:#090d16;
      border:0.5px solid var(--border);
      border-radius:10px;
      color:#fff;
      font-size:15px;
      transition:border-color 0.2s;
    }
    input[type="tel"]:focus { outline:none; border-color:var(--teal); }

    button.run-btn {
      padding:0.8rem 1.6rem;
      background-color:var(--teal);
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:opacity 0.2s;
    }
    button.run-btn:hover { opacity:0.9; }
    button.run-btn:disabled { background-color:var(--card2); color:var(--txt3); cursor:not-allowed; }

    /* ── Sources row ─────────────────────────────────────────── */
    .sources-row {
      display:none;
      gap:8px;
      margin-bottom:1.2rem;
    }
    .sources-row.visible { display:flex; }

    .source-pill {
      flex:1;
      display:flex; align-items:center; gap:7px;
      padding:8px 12px;
      border-radius:8px;
      border:0.5px solid var(--border);
      background:var(--card2);
      font-size:12px;
      font-weight:500;
      color:var(--txt2);
      transition:all 0.3s;
    }
    .source-pill i { font-size:15px; }
    .source-pill .pill-label { flex:1; }
    .source-pill .pill-status { font-size:11px; font-family:'DM Mono',monospace; }

    .source-pill.loading  { border-color:var(--teal-b);  color:var(--txt2); }
    .source-pill.loading i { color:var(--teal); animation:spin 0.8s linear infinite; }
    .source-pill.ok       { border-color:var(--green-b); background:rgba(34,197,94,0.06); color:var(--green); }
    .source-pill.ok i     { color:var(--green); }
    .source-pill.bad      { border-color:var(--red-b);   background:rgba(239,68,68,0.06); color:var(--red); }
    .source-pill.bad i    { color:var(--red); }
    .source-pill.warn     { border-color:rgba(245,158,11,0.4); background:rgba(245,158,11,0.06); color:var(--yellow); }
    .source-pill.warn i   { color:var(--yellow); }
    .source-pill.err      { border-color:var(--border); color:var(--txt3); }

    /* ── Main verdict card ───────────────────────────────────── */
    .status-display {
      border-radius:14px;
      border:0.5px solid var(--border);
      background:var(--card2);
      overflow:hidden;
      display:none;
      transition:border-color 0.4s ease;
    }
    .status-display.loading{ border-color:var(--teal-b); display:block; }
    .status-display.clean  { border-color:var(--green-b); display:block; animation:greenPulse 2s ease forwards; }
    .status-display.bad    { border-color:var(--red-b);   display:block; animation:redPulse 2s ease forwards; }
    .status-display.invalid{ border-color:var(--red-b);   display:block; animation:redPulse 2s ease forwards; }

    @keyframes greenPulse{ 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)} 100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)} }
    @keyframes redPulse{   0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)} 100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)} }

    .status-hero {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:2.2rem 1.5rem 1.6rem;
      transition:background 0.5s ease;
    }
    .loading .status-hero { background:var(--card2); }
    .clean   .status-hero { background:var(--green-glow); }
    .bad     .status-hero { background:var(--red-glow); }
    .invalid .status-hero { background:var(--red-glow); }

    .status-icon {
      width:72px; height:72px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:1rem;
    }
    .loading .status-icon { background:var(--teal-glow) }
    .loading .status-icon i { font-size:36px; color:var(--teal); animation:spin 0.8s linear infinite }
    .clean   .status-icon { background:rgba(34,197,94,0.2) }
    .clean   .status-icon i { font-size:36px; color:var(--green) }
    .bad     .status-icon { background:rgba(239,68,68,0.2) }
    .bad     .status-icon i { font-size:36px; color:var(--red) }
    .invalid .status-icon { background:rgba(239,68,68,0.2) }
    .invalid .status-icon i { font-size:36px; color:var(--red) }
    @keyframes spin{to{transform:rotate(360deg)}}

    .status-number {
      font-family:'DM Mono',monospace;
      font-size:20px; font-weight:500;
      letter-spacing:.06em;
      margin-bottom:.5rem;
    }
    .loading .status-number { color:var(--txt2) }
    .clean   .status-number { color:var(--green) }
    .bad     .status-number { color:var(--red) }
    .invalid .status-number { color:var(--red) }

    .status-verdict {
      font-size:26px; font-weight:700; letter-spacing:.02em;
    }
    .loading .status-verdict { color:var(--txt2); font-size:15px; font-weight:400 }
    .clean   .status-verdict { color:var(--green) }
    .bad     .status-verdict { color:var(--red) }
    .invalid .status-verdict { color:var(--red); font-size:18px }

    /* ── Flags section ───────────────────────────────────────── */
    .flags-section {
      padding:0 1.2rem 1.4rem;
      display:none;
      flex-direction:column;
      gap:8px;
    }
    .flags-section.visible { display:flex; }

    .flags-label {
      font-size:10px; font-weight:600; letter-spacing:.1em;
      color:var(--txt3); text-transform:uppercase;
      padding:0 2px; margin-bottom:2px;
      display:flex; align-items:center; gap:6px;
    }
    .flags-label span { flex:1; }
    .source-tag {
      font-size:9px; padding:2px 7px; border-radius:4px;
      background:rgba(255,255,255,0.06); border:0.5px solid rgba(255,255,255,0.1);
      color:var(--txt3); font-weight:500; letter-spacing:.05em;
    }

    .flag-row {
      display:flex; align-items:flex-start; gap:10px;
      padding:10px 14px;
      border-radius:8px;
      border:0.5px solid;
      animation:flagIn 0.3s ease forwards;
    }
    @keyframes flagIn{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .flag-row i { font-size:17px; flex-shrink:0; margin-top:1px; }
    .flag-row .flag-name { font-size:13px; font-weight:600; }
    .flag-row .flag-desc { font-size:11px; color:var(--txt2); line-height:1.35; margin-top:2px }

    .flag-code-badge {
      display:inline-flex; align-items:center; gap:4px;
      margin-top:5px; padding:2px 8px; border-radius:4px;
      font-family:'DM Mono',monospace; font-size:10px; font-weight:500;
      background:rgba(255,255,255,0.07); border:0.5px solid rgba(255,255,255,0.12);
      color:var(--txt2);
    }

    .flag-critical { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.35); }
    .flag-critical i, .flag-critical .flag-name { color:var(--red) }
    .flag-clean { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.3); }
    .flag-clean i, .flag-clean .flag-name { color:var(--green) }
    .flag-warn { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.3); }
    .flag-warn i, .flag-warn .flag-name { color:var(--yellow) }

    .section-divider {
      font-size:10px; font-weight:600; letter-spacing:.1em;
      color:var(--txt3); text-transform:uppercase;
      padding:4px 2px 2px;
      display:flex; align-items:center; gap:8px;
      margin-top:4px;
    }
    .section-divider::after {
      content:''; flex:1; height:0.5px; background:var(--border);
    }

    @media(max-width:480px){ .body{padding:1.25rem} .header{padding:1.25rem} .sources-row{flex-direction:column} }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">
      <img src="http://vocaltechmarketing.com/images/logo.png" alt="VTM Logo" onerror="this.parentElement.innerHTML='<i class=\'ti ti-shield-check\' style=\'font-size:22px;color:#fff\'></i>'">
    </div>
    <div class="header-txt">
      <h1>DNC Checker</h1>
      <p>Vocal Tech Marketing · Compliance Portal</p>
    </div>
    <div class="company-badge" id="companyBadge" style="display:none">
      <i class="ti ti-building"></i>
      <span id="companyBadgeText"></span>
    </div>
  </div>

  <div class="body">
    <div class="input-container">
      <input type="tel" id="phoneNumber" placeholder="Enter phone number..." autocomplete="off">
      <button id="runBtn" class="run-btn" onclick="executeLookup()">
        <i class="ti ti-search"></i> Check Number
      </button>
    </div>

    <!-- Source status pills -->
    <div class="sources-row" id="sourcesRow">
      <div class="source-pill loading" id="pillBLA">
        <i class="ti ti-loader-2"></i>
        <span class="pill-label">Blacklist Alliance</span>
        <span class="pill-status" id="pillBLAStatus">—</span>
      </div>
      <div class="source-pill loading" id="pillFB">
        <i class="ti ti-loader-2"></i>
        <span class="pill-label">DNC Scrubber</span>
        <span class="pill-status" id="pillFBStatus">—</span>
      </div>
    </div>

    <!-- Main verdict -->
    <div class="status-display" id="statusDisplay">
      <div class="status-hero">
        <div class="status-icon"><i class="ti ti-loader-2" id="statusIcon"></i></div>
        <div class="status-number" id="statusNumber">—</div>
        <div class="status-verdict" id="statusVerdict">Searching...</div>
      </div>

      <div class="flags-section" id="flagsSection">
        <div id="flagsList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js';

  // ── Firebase config ───────────────────────────────────────────
  const FB_CONFIG = {
    projectId:     "n64fj2elf4nz47phegkj0vdqftm4t6",
    apiKey:        "AIzaSyBuPlI7zb-QEx_KXVW-dXZ1I6b7qXhI4OI",
    appId:         "1:433640315891:web:9eb2f0ea88a5186013d086",
    authDomain:    "n64fj2elf4nz47phegkj0vdqftm4t6.firebaseapp.com",
    storageBucket: "n64fj2elf4nz47phegkj0vdqftm4t6.firebasestorage.app"
  };

  const fbApp  = initializeApp(FB_CONFIG);
  const fbFns  = getFunctions(fbApp);
  window._fbScrubPhone = httpsCallable(fbFns, 'scrub_phone', { timeout: 60000 });

  // ── BLA constants ─────────────────────────────────────────────
  const BLA_KEY        = 'zkU3p9bRrzVDgcKRC2sK';
  const BLA_BASE       = `https://api.blacklistalliance.net/standard/api/v1/Lookup/key/${BLA_KEY}/response/json/phone/`;
  const GOOGLE_LOG_URL = 'https://script.google.com/macros/s/AKfycby8j6erDfX9E6j8Y03uv4JdLzLykAYY4dzvYJRj94QEl4LBBSR0uc2THu_sTXg97n5wIw/exec';

  // ── Allowed companies ─────────────────────────────────────────
  const ALLOWED_COMPANIES = ['echolink', 'vtm'];

  const urlParams        = new URLSearchParams(window.location.search);
  const companyParam     = urlParams.get('company');
  const sanitizedCompany = companyParam ? companyParam.trim().toLowerCase() : '';

  if (!sanitizedCompany || !ALLOWED_COMPANIES.includes(sanitizedCompany)) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:100vh;background:#0b0f19;font-family:'DM Sans',sans-serif;text-align:center;padding:2rem;">
        <div style="width:64px;height:64px;background:rgba(239,68,68,0.15);border-radius:50%;
          display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
          <i class="ti ti-lock" style="font-size:30px;color:#ef4444;"></i>
        </div>
        <h2 style="color:#f9fafb;font-size:20px;font-weight:600;margin-bottom:8px;">Access Restricted</h2>
        <p style="color:#6b7280;font-size:14px;max-width:320px;line-height:1.6;">
          This portal requires an authorized company link.<br>Please contact Vocal Tech Marketing to get your access link.
        </p>
      </div>`;
    throw new Error('Access blocked: unauthorized company.');
  }

  const COMPANY_NAME = companyParam.trim();
  document.getElementById('companyBadgeText').textContent = COMPANY_NAME;
  document.getElementById('companyBadge').style.display = 'flex';

  // ── BLA verdict map ───────────────────────────────────────────
  const VERDICT_MAP = {
    'none':       { isClean: true,  name: 'No Records Found',         desc: 'Not listed on any blacklist, DNC, litigator, or complaint registry.',    icon: 'ti-shield-check' },
    'federal-dnc':{ isClean: false, name: 'Federal DNC Match',         desc: 'Registered on the National Do Not Call Registry (FTC). Do not contact.', icon: 'ti-building-government' },
    'litigator':  { isClean: false, name: 'TCPA Litigator Threat',     desc: 'Known serial plaintiff or class-action attorney. CRITICAL risk.',        icon: 'ti-gavel' },
    'screamer':   { isClean: false, name: 'Hostile Screamer',          desc: 'Known hostile caller prone to aggressive responses.',                    icon: 'ti-speakerphone' },
    'complainer': { isClean: false, name: 'DNC Complainer Registry',   desc: 'Has filed formal complaints with regulatory bodies. High legal risk.',   icon: 'ti-message-report' },
    'dnc':        { isClean: false, name: 'DNC Record Found',          desc: 'Listed on active Do Not Call registries.',                               icon: 'ti-phone-x' },
    'state':      { isClean: false, name: 'State DNC Registry',        desc: 'Listed on a restricted State Do Not Call list.',                         icon: 'ti-map-pin-off' },
    'internal':   { isClean: false, name: 'Internal DNC Flag',         desc: 'Flagged on internal company suppression files.',                         icon: 'ti-database-x' },
    'reassigned': { isClean: false, name: 'Reassigned Number Warning', desc: 'Number has changed owners. Active consent requires confirmation.',       icon: 'ti-arrows-exchange' }
  };

  // ── Firebase scrub result map ─────────────────────────────────
  const FB_VALUE_MAP = {
    'FederalDNC':  { name: 'Federal DNC (Scrubber)',  desc: 'Number matched Federal Do Not Call registry via DNC Scrubber database.',  icon: 'ti-building-government', bad: true  },
    'StateDNC':    { name: 'State DNC (Scrubber)',    desc: 'Number matched a State Do Not Call registry via DNC Scrubber database.',   icon: 'ti-map-pin-off',         bad: true  },
    'bla':         { name: 'BLA Match (Scrubber)',    desc: 'Blacklist Alliance match flagged via DNC Scrubber cross-reference.',       icon: 'ti-ban',                 bad: true  },
    'dnc':         { name: 'DNC Match (Scrubber)',    desc: 'General DNC record found in DNC Scrubber database.',                      icon: 'ti-phone-x',             bad: true  },
    'No area code':{ name: 'Invalid Area Code',       desc: 'Number does not have a valid area code.',                                 icon: 'ti-alert-triangle',      bad: false }
  };

  function formatPhone(d) {
    d = d.replace(/\D/g,'');
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    if (d.length === 11 && d[0]==='1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    return d;
  }

  function setPill(id, state, statusText) {
    const el = document.getElementById(id);
    const iconEl = el.querySelector('i');
    const statusEl = el.querySelector('.pill-status');
    el.className = `source-pill ${state}`;
    statusEl.textContent = statusText;
    const iconMap = { loading:'ti-loader-2', ok:'ti-circle-check', bad:'ti-ban', warn:'ti-alert-triangle', err:'ti-wifi-off' };
    iconEl.className = `ti ${iconMap[state] || 'ti-loader-2'}`;
  }

  window.executeLookup = async function() {
    const input   = document.getElementById('phoneNumber');
    const btn     = document.getElementById('runBtn');
    const display = document.getElementById('statusDisplay');
    const icon    = document.getElementById('statusIcon');
    const numEl   = document.getElementById('statusNumber');
    const verdict = document.getElementById('statusVerdict');
    const section = document.getElementById('flagsSection');
    const list    = document.getElementById('flagsList');
    const srcRow  = document.getElementById('sourcesRow');

    const phoneVal = input.value.trim();
    if (!phoneVal) return alert('Please enter a phone number.');
    const cleanNum = phoneVal.replace(/\D/g,'');
    if (cleanNum.length < 7 || cleanNum.length > 15) { alert('Invalid phone format.'); return; }

    btn.disabled = true;

    // Fetch IP (fire-and-forget)
    let userIP = 'Unknown';
    try { const r = await fetch('https://api.ipify.org?format=json'); userIP = (await r.json()).ip || 'Unknown'; } catch(e) {}

    // Show loading state
    srcRow.className  = 'sources-row visible';
    setPill('pillBLA', 'loading', 'Checking…');
    setPill('pillFB',  'loading', 'Checking…');
    display.className = 'status-display loading';
    icon.className    = 'ti ti-loader-2';
    numEl.textContent = formatPhone(cleanNum);
    verdict.textContent = 'Searching…';
    section.classList.remove('visible');
    list.innerHTML = '';

    // ── Run both APIs in parallel ─────────────────────────────
    const [blaResult, fbResult] = await Promise.allSettled([
      fetch(`${BLA_BASE}${cleanNum}`).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      window._fbScrubPhone([cleanNum])
    ]);

    // ── Parse BLA ─────────────────────────────────────────────
    let blaData  = null, blaCode = 'error', blaMsg = '', blaClean = false;
    if (blaResult.status === 'fulfilled') {
      blaData  = blaResult.value;
      blaCode  = (blaData.code || 'none').toLowerCase();
      blaMsg   = blaData.message || '';
      blaClean = (blaCode === 'none' || blaMsg.toLowerCase() === 'good');
      setPill('pillBLA', blaClean ? 'ok' : 'bad', blaClean ? 'CLEAN' : 'FLAGGED');
    } else {
      setPill('pillBLA', 'err', 'Error');
    }

    // ── Parse Firebase scrub_phone ────────────────────────────
    let fbResults = [], fbClean = true, fbError = false;
    if (fbResult.status === 'fulfilled') {
      const fbData = fbResult.value?.data;
      if (fbData?.status === 200) {
        fbResults = fbData.results || [];
        // isDoNotTransfer logic from the original app:
        // flagged if any result is NOT clean AND value is not FederalDNC / StateDNC / No area code / Federal DNC (non-litigator)
        fbClean = !fbResults.some(({clean, value}) =>
          !(clean || value === 'FederalDNC' || value === 'StateDNC' ||
            value === 'No area code' || (value.startsWith('Federal DNC') && !/litigator/i.test(value)))
        );
        // For pill: show flagged if any result is not clean at all
        const anyBad = fbResults.some(r => !r.clean);
        setPill('pillFB', anyBad ? 'bad' : 'ok', anyBad ? 'FLAGGED' : 'CLEAN');
      } else if (fbData?.status === 402) {
        setPill('pillFB', 'err', 'Auth Error');
        fbError = true;
      } else {
        setPill('pillFB', 'err', fbData?.msg || 'Error');
        fbError = true;
      }
    } else {
      setPill('pillFB', 'err', 'Unavailable');
      fbError = true;
    }

    // ── Combined verdict: flagged if EITHER source flags it ───
    const overallClean = (blaResult.status === 'fulfilled' ? blaClean : true) &&
                         (fbError ? true : fbClean);
    // If BLA errored AND FB errored → show error state
    const bothFailed = blaResult.status === 'rejected' && fbError;

    // ── Render verdict ────────────────────────────────────────
    section.classList.add('visible');
    list.innerHTML = '';

    if (bothFailed) {
      display.className = 'status-display invalid';
      icon.className    = 'ti ti-alert-triangle';
      verdict.textContent = 'CHECK FAILED';
      list.innerHTML = flagRow('critical', 'ti-wifi-off', 'Connection Error', 'Could not reach either compliance database. Please check your connection and retry.', null);
      btn.disabled = false;
      return;
    }

    if (overallClean) {
      display.className   = 'status-display clean';
      icon.className      = 'ti ti-circle-check';
      verdict.textContent = 'CLEAN';
    } else {
      display.className   = 'status-display bad';
      icon.className      = 'ti ti-ban';
      verdict.textContent = 'DO NOT TRANSFER';
    }

    // ── BLA flags ─────────────────────────────────────────────
    if (blaResult.status === 'fulfilled') {
      list.innerHTML += sectionDivider('Blacklist Alliance');
      const cfg = VERDICT_MAP[blaCode] || { isClean: false, name: blaMsg || 'Database Match', desc: `API code: ${blaCode}`, icon: 'ti-alert-triangle' };
      if (blaClean) {
        list.innerHTML += flagRow('clean', cfg.icon, cfg.name, cfg.desc, blaCode);
      } else {
        list.innerHTML += flagRow('critical', cfg.icon, cfg.name, cfg.desc, blaCode);
      }
    } else {
      list.innerHTML += sectionDivider('Blacklist Alliance');
      list.innerHTML += flagRow('warn', 'ti-wifi-off', 'BLA Unavailable', blaResult.reason?.message || 'Could not reach Blacklist Alliance API.', null);
    }

    // ── Firebase scrub flags ──────────────────────────────────
    list.innerHTML += sectionDivider('DNC Scrubber');
    if (fbError) {
      list.innerHTML += flagRow('warn', 'ti-wifi-off', 'DNC Scrubber Unavailable', fbResult.reason?.message || 'Could not reach DNC Scrubber.', null);
    } else if (fbResults.length === 0) {
      list.innerHTML += flagRow('clean', 'ti-shield-check', 'No Records Found', 'Not found in DNC Scrubber database.', null);
    } else {
      for (const res of fbResults) {
        const val  = res.value || '';
        const meta = FB_VALUE_MAP[val] || {
          name: val || 'DNC Record',
          desc: res.clean ? 'Marked clean in DNC Scrubber.' : 'Flagged in DNC Scrubber database.',
          icon: res.clean ? 'ti-shield-check' : 'ti-phone-x',
          bad:  !res.clean
        };
        const rowType = res.clean ? 'clean' : (meta.bad ? 'critical' : 'warn');
        list.innerHTML += flagRow(rowType, meta.icon, meta.name, meta.desc, val || null);
      }
    }

    // ── Background log ────────────────────────────────────────
    const logPayload = {
      phone:   cleanNum,
      company: COMPANY_NAME,
      ip:      userIP,
      bla_code:blaCode,
      bla_msg: blaMsg,
      fb_clean:fbClean,
      fb_results: JSON.stringify(fbResults)
    };
    const qs = new URLSearchParams(logPayload).toString();
    fetch(`${GOOGLE_LOG_URL}?${qs}`, { method:'GET', mode:'no-cors' }).catch(() => {});

    btn.disabled = false;
  };

  // ── HTML helpers ──────────────────────────────────────────────
  function sectionDivider(label) {
    return `<div class="section-divider">${label}</div>`;
  }

  function flagRow(type, icon, name, desc, code) {
    const codeHtml = code ? `<div class="flag-code-badge"><i class="ti ti-tag"></i> code: <strong>${code}</strong></div>` : '';
    return `
      <div class="flag-row flag-${type}">
        <i class="ti ${icon}"></i>
        <div style="flex:1">
          <div class="flag-name">${name}</div>
          <div class="flag-desc">${desc}</div>
          ${codeHtml}
        </div>
      </div>`;
  }
</script>
</body>
</html>
