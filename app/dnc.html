<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root {
  --bg:        #0b0f19;
  --card:      #111827;
  --card2:     #1f2937;
  --border:    #374151;
  --txt:       #f9fafb;
  --txt2:      #9ca3af;
  --txt3:      #6b7280;
  --teal:      #1a9e75;
  --teal-glow: rgba(26,158,117,0.15);
  --teal-b:    rgba(26,158,117,0.35);
  --green:     #22c55e;
  --green-glow:rgba(34,197,94,0.12);
  --green-b:   rgba(34,197,94,0.4);
  --red:       #ef4444;
  --red-glow:  rgba(239,68,68,0.12);
  --red-b:     rgba(239,68,68,0.4);
  --yellow:    #f59e0b;
  --yellow-glow:rgba(245,158,11,0.12);
  --yellow-b:  rgba(245,158,11,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
}

.card{
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:16px;
  width:100%;max-width:520px;
  overflow:hidden;
  box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  background:#090d16;
  padding:1.4rem 2rem;
  display:flex;align-items:center;gap:14px;
  border-bottom:0.5px solid var(--border);
}
.logo{
  width:40px;height:40px;
  background:var(--teal);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.logo i{font-size:22px;color:#fff}
.header-txt h1{font-size:16px;font-weight:600;color:#fff}
.header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}
.live-badge{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  background:var(--teal-glow);
  border:0.5px solid var(--teal-b);
  border-radius:20px;padding:4px 12px;
  font-size:12px;color:var(--teal);font-weight:500;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BODY */
.body{padding:2rem}

/* SESSION BAR */
.session-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--card2);
  border:0.5px solid var(--border);
  border-radius:8px;padding:10px 14px;
  margin-bottom:1.5rem;
}
.session-bar i{font-size:16px;color:var(--teal)}
.session-bar span{font-size:13px;color:var(--txt2)}
.session-bar .time{
  margin-left:auto;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--txt2);
  background:var(--bg);
  border:0.5px solid var(--border);
  padding:2px 8px;border-radius:4px;
}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.stat{
  background:var(--card2);
  border:0.5px solid var(--border);
  border-radius:8px;padding:14px;
  text-align:center;
}
.stat-n{font-size:24px;font-weight:700}
.stat-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}

/* STATUS DISPLAY */
.status-display{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2.5rem 1.5rem;
  border-radius:14px;
  border:0.5px solid var(--border);
  background:var(--card2);
  min-height:200px;
  position:relative;
  overflow:hidden;
  transition:background 0.5s ease, border-color 0.5s ease;
}

/* idle */
.status-display.idle{
  background:var(--card2);
  border-color:var(--border);
}
.status-display.loading{
  background:var(--card2);
  border-color:var(--teal-b);
}
.status-display.clean{
  background:var(--green-glow);
  border-color:var(--green-b);
  animation:greenPulse 2s ease forwards;
}
.status-display.bad{
  background:var(--red-glow);
  border-color:var(--red-b);
  animation:redPulse 2s ease forwards;
}
.status-display.invalid{
  background:var(--yellow-glow);
  border-color:var(--yellow-b);
}

@keyframes greenPulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)}
}
@keyframes redPulse{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)}
}

.status-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1rem;
  transition:background 0.4s;
}
.idle .status-icon{background:rgba(255,255,255,0.05)}
.idle .status-icon i{font-size:36px;color:var(--txt3)}
.loading .status-icon{background:var(--teal-glow)}
.loading .status-icon i{font-size:36px;color:var(--teal);animation:spin 0.8s linear infinite}
.clean .status-icon{background:rgba(34,197,94,0.2)}
.clean .status-icon i{font-size:36px;color:var(--green)}
.bad .status-icon{background:rgba(239,68,68,0.2)}
.bad .status-icon i{font-size:36px;color:var(--red)}
.invalid .status-icon{background:rgba(245,158,11,0.2)}
.invalid .status-icon i{font-size:36px;color:var(--yellow)}

@keyframes spin{to{transform:rotate(360deg)}}

.status-number{
  font-family:'DM Mono',monospace;
  font-size:22px;font-weight:500;
  letter-spacing:.06em;
  margin-bottom:.5rem;
  transition:color 0.4s;
}
.idle .status-number{color:var(--txt3)}
.loading .status-number{color:var(--txt2)}
.clean .status-number{color:var(--green)}
.bad .status-number{color:var(--red)}
.invalid .status-number{color:var(--yellow)}

.status-verdict{
  font-size:28px;font-weight:700;
  letter-spacing:.02em;
  transition:color 0.4s;
}
.idle .status-verdict{color:var(--txt3);font-size:16px;font-weight:400}
.loading .status-verdict{color:var(--txt2);font-size:16px;font-weight:400}
.clean .status-verdict{color:var(--green)}
.bad .status-verdict{color:var(--red)}
.invalid .status-verdict{color:var(--yellow);font-size:18px}

.status-sub{
  margin-top:.4rem;
  font-size:12px;color:var(--txt2);
  text-align:center;
}

/* HISTORY */
.history-section{
  margin-top:1.5rem;
  border-top:0.5px solid var(--border);
  padding-top:1.25rem;
}
.hist-hdr{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.hist-hdr span{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
.hist-clear{
  background:none;border:none;cursor:pointer;
  font-size:11px;color:var(--txt3);font-family:'DM Sans',sans-serif;
  transition:color .15s;
}
.hist-clear:hover{color:var(--red)}
.hist-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:7px;
  background:rgba(15,23,42,.5);
  margin-bottom:6px;
  border-left:2px solid transparent;
}
.hist-item.clean{border-left-color:var(--green)}
.hist-item.bad{border-left-color:var(--red)}
.hist-item.invalid{border-left-color:var(--yellow)}
.hist-num{font-family:'DM Mono',monospace;color:var(--txt);font-size:12px}
.hist-badge{
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.04em;
}
.clean .hist-badge{background:rgba(34,197,94,.2);color:#4ade80}
.bad   .hist-badge{background:rgba(239,68,68,.2);color:#f87171}
.invalid .hist-badge{background:rgba(245,158,11,.2);color:#fbbf24}

/* FOOTER */
.footer{
  border-top:0.5px solid var(--border);
  background:#090d16;
  padding:12px 2rem;
  display:flex;align-items:center;gap:8px;
}
.footer span{font-size:11px;color:var(--txt2);font-family:'DM Mono',monospace}
.url-pill{
  margin-left:auto;font-size:11px;color:var(--teal);
  font-family:'DM Mono',monospace;
  background:var(--teal-glow);padding:3px 10px;
  border-radius:20px;border:0.5px solid var(--teal-b);
}

/* NO CALL */
.no-call{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;
  text-align:center;gap:16px;
}
.no-call-icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--card);border:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.no-call-icon i{font-size:32px;color:var(--txt2)}
.no-call h2{font-size:18px;font-weight:500}

@media(max-width:480px){
  .body{padding:1.25rem}
  .header{padding:1.25rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── PARAMS ──────────────────────────────────────────────────────
const ALIASES = {
  phone:    ['phone_number','phone','phonenumber'],
  campaign: ['campaign','campaign_id'],
  agent:    ['user','agent','agent_name','fullname'],
};
function getParam(name){
  const params = new URLSearchParams(window.location.search);
  for(const k of (ALIASES[name]||[name])){
    const v = params.get(k);
    if(v&&v.trim()) return v.trim();
  }
  return '';
}
function isLiveCall(){
  const params = new URLSearchParams(window.location.search);
  return ['phone_number','phone','campaign','list_id','lead_id'].some(p=>params.get(p));
}

// ── BLACKLIST (replace with real API call) ──────────────────────
const BLACKLIST = ['5550199','6666666','9110000','1234567','9999999','0000000','5555555','8675309'];

// ── STATE ───────────────────────────────────────────────────────
let history = JSON.parse(sessionStorage.getItem('allianceHistory')||'[]');

// ── BOOT ────────────────────────────────────────────────────────
function boot(){
  /* For demo purposes, if no URL params, render portal in demo mode */
  if(!isLiveCall()){
    renderNoCall(); return;
  }
  renderPortal();
}

function renderNoCall(){
  document.getElementById('app').innerHTML=`
    <div class="no-call">
      <div class="no-call-icon"><i class="ti ti-phone-off"></i></div>
      <h2>No Webform Detected</h2>
    </div>`;
}

function renderPortal(){
  const agent    = getParam('agent')    || '—';
  const campaign = getParam('campaign') || '—';
  const phone    = getParam('phone');

  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="header">
        <div class="logo"><i class="ti ti-shield-check"></i></div>
        <div class="header-txt">
          <h1>Alliance Checker</h1>
          <p>Vocal-Echo · Blacklist Verification</p>
        </div>
        <div class="live-badge"><div class="dot"></div>Live call</div>
      </div>

      <div class="body">
        <div class="session-bar">
          <i class="ti ti-headset"></i>
          <span>${agent} &nbsp;·&nbsp; ${campaign}</span>
          <span class="time" id="sessionTime">0:00</span>
        </div>

        <div class="stats">
          <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Checked</div></div>
          <div class="stat"><div class="stat-n" id="st-clean">0</div><div class="stat-l">Clean</div></div>
          <div class="stat"><div class="stat-n" id="st-bad">0</div><div class="stat-l">Flagged</div></div>
        </div>

        <!-- STATUS DISPLAY — phone auto-checked from backend -->
        <div class="status-display idle" id="statusDisplay">
          <div class="status-icon"><i class="ti ti-shield" id="statusIcon"></i></div>
          <div class="status-number" id="statusNumber">—</div>
          <div class="status-verdict" id="statusVerdict">Awaiting verification…</div>
          <div class="status-sub" id="statusSub"></div>
        </div>

        <div class="history-section" id="historySection" style="display:none">
          <div class="hist-hdr">
            <span>Recent checks</span>
            <button class="hist-clear" onclick="clearHistory()">Clear</button>
          </div>
          <div id="historyList"></div>
        </div>
      </div>

      <div class="footer">
        <i class="ti ti-lock" style="font-size:13px;color:var(--txt2)"></i>
        <span>Vicidial session active</span>
        <span class="url-pill">alliance-checker</span>
      </div>
    </div>`;

  // Session clock
  const t0 = Date.now();
  setInterval(()=>{
    const s=Math.floor((Date.now()-t0)/1000);
    document.getElementById('sessionTime').textContent=
      `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  },1000);

  renderHistory();
  updateStats();

  // Auto-check phone from URL immediately
  if(phone) setTimeout(()=>runCheck(phone), 700);
}

// ── CHECK ────────────────────────────────────────────────────────
function runCheck(rawPhone){
  const display = document.getElementById('statusDisplay');
  const icon    = document.getElementById('statusIcon');
  const numEl   = document.getElementById('statusNumber');
  const verdict = document.getElementById('statusVerdict');
  const sub     = document.getElementById('statusSub');

  // Loading state
  display.className = 'status-display loading';
  icon.className    = 'ti ti-loader-2';
  numEl.textContent = rawPhone;
  verdict.textContent = 'Scanning database…';
  sub.textContent   = '';

  setTimeout(()=>{
    const clean = rawPhone.replace(/\D/g,'');
    let status, iconCls, verdictText, subText;

    if(clean.length < 7 || clean.length > 15){
      status      = 'invalid';
      iconCls     = 'ti-alert-triangle';
      verdictText = 'INVALID';
      subText     = 'Number format is invalid.';
    } else if(BLACKLIST.some(b => clean.endsWith(b))){
      status      = 'bad';
      iconCls     = 'ti-ban';
      verdictText = 'BAD';
      subText     = 'Found in Alliance blacklist database.';
    } else {
      const sum = clean.split('').reduce((a,c)=>a+ +c,0);
      if(sum%7===0 && clean.length>9){
        status      = 'bad';
        iconCls     = 'ti-alert-circle';
        verdictText = 'BAD';
        subText     = 'Suspicious algorithmic pattern detected.';
      } else {
        status      = 'clean';
        iconCls     = 'ti-circle-check';
        verdictText = 'CLEAN';
        subText     = 'No records found in blacklist database.';
      }
    }

    display.className   = `status-display ${status}`;
    icon.className      = `ti ${iconCls}`;
    numEl.textContent   = rawPhone;
    verdict.textContent = verdictText;
    sub.textContent     = subText;

    addHistory({number: rawPhone, status});
  }, 1100);
}

// ── HISTORY ──────────────────────────────────────────────────────
function addHistory(item){
  history.unshift(item);
  if(history.length>10) history.pop();
  sessionStorage.setItem('allianceHistory',JSON.stringify(history));
  renderHistory();
  updateStats();
}

function renderHistory(){
  const section = document.getElementById('historySection');
  const list    = document.getElementById('historyList');
  if(!section) return;
  if(!history.length){section.style.display='none';return;}
  section.style.display='block';
  list.innerHTML = history.map(h=>`
    <div class="hist-item ${h.status}">
      <span class="hist-num">${h.number}</span>
      <span class="hist-badge">${h.status==='clean'?'CLEAN':h.status==='bad'?'BAD':'INVALID'}</span>
    </div>`).join('');
}

function updateStats(){
  const t=document.getElementById('st-total');
  const c=document.getElementById('st-clean');
  const b=document.getElementById('st-bad');
  if(!t)return;
  t.textContent=history.length;
  c.textContent=history.filter(h=>h.status==='clean').length;
  b.textContent=history.filter(h=>h.status==='bad').length;
}

function clearHistory(){
  history=[];
  sessionStorage.removeItem('allianceHistory');
  renderHistory();
  updateStats();
}

boot();
</script>
</body>
</html>
