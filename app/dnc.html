<!DOCTYPE html>
<html lang="en">
<head>
<title>VTM DNC Portal</title>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root {
  --bg:        #0b0f19;
  --card:      #111827;
  --card2:     #1f2937;
  --border:    #374151;
  --txt:       #f9fafb;
  --txt2:      #9ca3af;
  --txt3:      #6b7280;
  --teal:      #1a9e75;
  --teal-glow: rgba(26,158,117,0.15);
  --teal-b:    rgba(26,158,117,0.35);
  --green:     #22c55e;
  --green-glow:rgba(34,197,94,0.12);
  --green-b:   rgba(34,197,94,0.4);
  --red:       #ef4444;
  --red-glow:  rgba(239,68,68,0.12);
  --red-b:     rgba(239,68,68,0.4);
  --orange:    #f97316;
  --orange-glow:rgba(249,115,22,0.12);
  --orange-b:  rgba(249,115,22,0.4);
  --yellow:    #f59e0b;
  --yellow-glow:rgba(245,158,11,0.12);
  --yellow-b:  rgba(245,158,11,0.35);
  --purple:    #a855f7;
  --purple-glow:rgba(168,85,247,0.12);
  --purple-b:  rgba(168,85,247,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
}
.card{
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:16px;
  width:100%;max-width:540px;
  overflow:hidden;
  box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
}
.header{
  background:#090d16;
  padding:1.4rem 2rem;
  display:flex;align-items:center;gap:14px;
  border-bottom:0.5px solid var(--border);
}
.logo{
  width:40px;height:40px;
  background:var(--teal);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo i{font-size:22px;color:#fff}
.header-txt h1{font-size:16px;font-weight:600;color:#fff}
.header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}
.live-badge{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  background:var(--teal-glow);
  border:0.5px solid var(--teal-b);
  border-radius:20px;padding:4px 12px;
  font-size:12px;color:var(--teal);font-weight:500;
  flex-shrink:0;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.body{padding:2rem}

/* ── Main status display ─────────────────────────────────── */
.status-display{
  border-radius:14px;
  border:0.5px solid var(--border);
  background:var(--card2);
  overflow:hidden;
  transition:border-color 0.4s ease;
}
.status-display.idle   { border-color:var(--border); }
.status-display.loading{ border-color:var(--teal-b); }
.status-display.clean  { border-color:var(--green-b); animation:greenPulse 2s ease forwards; }
.status-display.bad    { border-color:var(--red-b);   animation:redPulse 2s ease forwards; }
.status-display.warn   { border-color:var(--orange-b); }
.status-display.invalid{ border-color:var(--yellow-b); }

@keyframes greenPulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)}
}
@keyframes redPulse{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)}
}

/* ── Hero section ─────────────────────────────────────────── */
.status-hero{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2.2rem 1.5rem 1.6rem;
  transition:background 0.5s ease;
  gap:0;
}
.idle    .status-hero { background:var(--card2); }
.loading .status-hero { background:var(--card2); }
.clean   .status-hero { background:var(--green-glow); }
.bad     .status-hero { background:var(--red-glow); }
.warn    .status-hero { background:var(--red-glow); }
.invalid .status-hero { background:var(--yellow-glow); }

.status-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1rem;
  transition:background 0.4s;
}
.idle    .status-icon { background:rgba(255,255,255,0.05) }
.idle    .status-icon i { font-size:36px;color:var(--txt3) }
.loading .status-icon { background:var(--teal-glow) }
.loading .status-icon i { font-size:36px;color:var(--teal);animation:spin 0.8s linear infinite }
.clean   .status-icon { background:rgba(34,197,94,0.2) }
.clean   .status-icon i { font-size:36px;color:var(--green) }
.bad     .status-icon { background:rgba(239,68,68,0.2) }
.bad     .status-icon i { font-size:36px;color:var(--red) }
.warn    .status-icon { background:rgba(239,68,68,0.2) }
.warn    .status-icon i { font-size:36px;color:var(--red) }
.invalid .status-icon { background:rgba(245,158,11,0.2) }
.invalid .status-icon i { font-size:36px;color:var(--yellow) }
@keyframes spin{to{transform:rotate(360deg)}}

.status-number{
  font-family:'DM Mono',monospace;
  font-size:20px;font-weight:500;
  letter-spacing:.06em;
  margin-bottom:.5rem;
  transition:color 0.4s;
}
.idle    .status-number { color:var(--txt3) }
.loading .status-number { color:var(--txt2) }
.clean   .status-number { color:var(--green) }
.bad     .status-number { color:var(--red) }
.warn    .status-number { color:var(--red) }
.invalid .status-number { color:var(--yellow) }

.status-verdict{
  font-size:26px;font-weight:700;letter-spacing:.02em;
  transition:color 0.4s;
}
.idle    .status-verdict { color:var(--txt3);font-size:15px;font-weight:400 }
.loading .status-verdict { color:var(--txt2);font-size:15px;font-weight:400 }
.clean   .status-verdict { color:var(--green) }
.bad     .status-verdict { color:var(--red) }
.warn    .status-verdict { color:var(--red) }
.invalid .status-verdict { color:var(--yellow);font-size:18px }

/* ── API Message pill (shown below verdict) ──────────────── */
.api-message-pill{
  display:none;
  margin-top:10px;
  align-items:center;gap:6px;
  padding:5px 14px;
  border-radius:20px;
  font-size:12px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;
  border:0.5px solid;
  animation:fadeUp 0.35s ease forwards;
}
.api-message-pill.visible { display:inline-flex; }

@keyframes fadeUp{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}

/* Color variants driven by JS */
.api-message-pill.pill-red    { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.4); color:var(--red); }
.api-message-pill.pill-green  { background:rgba(34,197,94,0.1);  border-color:rgba(34,197,94,0.4); color:var(--green); }
.api-message-pill.pill-yellow { background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.4); color:var(--yellow); }
.api-message-pill.pill-teal   { background:var(--teal-glow);     border-color:var(--teal-b);       color:var(--teal); }

/* ── Flags grid ─────────────────────────────────────────── */
.flags-section{
  padding:0 1.2rem 1.4rem;
  display:none;
  flex-direction:column;
  gap:8px;
}
.flags-section.visible { display:flex; }

.flags-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  color:var(--txt3);text-transform:uppercase;
  padding:0 2px;margin-bottom:2px;
}

.flag-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;
  border-radius:8px;
  border:0.5px solid;
  transition:all 0.3s ease;
  animation:flagIn 0.3s ease forwards;
}
@keyframes flagIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
.flag-row i { font-size:17px; flex-shrink:0; margin-top:1px; }
.flag-row .flag-name { font-size:13px;font-weight:600;flex:1 }
.flag-row .flag-desc { font-size:11px;color:var(--txt2);line-height:1.35;margin-top:2px }

/* ── API Code badge inside flag row ─────────────────────── */
.flag-code-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  margin-top:5px;
  padding:2px 8px;
  border-radius:4px;
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;
  letter-spacing:.05em;
  background:rgba(255,255,255,0.07);
  border:0.5px solid rgba(255,255,255,0.12);
  color:var(--txt2);
}
.flag-code-badge i { font-size:11px; }

/* Severity variants */
.flag-critical{
  background:rgba(239,68,68,0.1);
  border-color:rgba(239,68,68,0.35);
}
.flag-critical i,.flag-critical .flag-name { color:var(--red) }

.flag-high{
  background:rgba(239,68,68,0.09);
  border-color:rgba(239,68,68,0.3);
}
.flag-high i,.flag-high .flag-name { color:var(--red) }

.flag-medium{
  background:rgba(239,68,68,0.07);
  border-color:rgba(239,68,68,0.25);
}
.flag-medium i,.flag-medium .flag-name { color:var(--red) }

.flag-info{
  background:rgba(26,158,117,0.08);
  border-color:rgba(26,158,117,0.3);
}
.flag-info i,.flag-info .flag-name { color:var(--teal) }

.flag-clean{
  background:rgba(34,197,94,0.08);
  border-color:rgba(34,197,94,0.3);
}
.flag-clean i,.flag-clean .flag-name { color:var(--green) }

.flag-api-code{
  background:rgba(168,85,247,0.08);
  border-color:rgba(168,85,247,0.3);
}
.flag-api-code i,.flag-api-code .flag-name { color:var(--purple) }

/* ── API Status row (shown as first info flag) ───────────── */
.flag-status{
  background:rgba(26,158,117,0.06);
  border-color:rgba(26,158,117,0.25);
}
.flag-status i,.flag-status .flag-name { color:var(--teal) }

/* ── Raw data accordion ──────────────────────────────────── */
.raw-toggle{
  display:none;
  align-items:center;gap:6px;
  background:transparent;
  border:none;border-top:0.5px solid var(--border);
  width:100%;padding:9px 16px;
  color:var(--txt3);font-size:11px;font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:color 0.2s;
}
.raw-toggle.visible{display:flex}
.raw-toggle:hover{color:var(--txt2)}
.raw-toggle i{font-size:14px}
.raw-toggle span{margin-left:auto;font-size:10px;letter-spacing:.05em}

.raw-body{
  display:none;
  padding:12px 16px;
  border-top:0.5px solid var(--border);
  background:var(--bg);
}
.raw-body.open{display:block}
.raw-body pre{
  font-family:'DM Mono',monospace;
  font-size:10.5px;
  color:var(--txt2);
  white-space:pre-wrap;
  word-break:break-all;
  line-height:1.6;
}

/* ── No call state ──────────────────────────────────────── */
.no-call{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;
  text-align:center;gap:16px;
}
.no-call-icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--card);border:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.no-call-icon i{font-size:32px;color:var(--txt2)}
.no-call h2{font-size:18px;font-weight:500}

@media(max-width:480px){
  .body{padding:1.25rem}
  .header{padding:1.25rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── CONFIG ────────────────────────────────────────────────────────
const API_KEY  = 'zkU3p9bRrzVDgcKRC2sK';
const API_BASE = `https://api.blacklistalliance.net/standard/api/v1/Lookup/key/${API_KEY}/response/json/phone/`;

// ── PARAM ALIASES ─────────────────────────────────────────────────
const ALIASES = {
  phone:    ['phone_number','phone','phonenumber'],
  campaign: ['campaign','campaign_id'],
  agent:    ['user','agent','agent_name','fullname'],
};
function getParam(name){
  const p = new URLSearchParams(window.location.search);
  for(const k of (ALIASES[name]||[name])){
    const v = p.get(k);
    if(v && v.trim()) return v.trim();
  }
  return '';
}
function isLiveCall(){
  const p = new URLSearchParams(window.location.search);
  return ['phone_number','phone','campaign','list_id','lead_id'].some(k => p.get(k));
}

// ── FLAG DEFINITIONS ──────────────────────────────────────────────
const FLAG_MAP = [
  {
    key: 'litigator',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'critical',
    icon: 'ti-gavel',
    name: 'TCPA Litigator',
    desc: 'Known serial plaintiff or class-action attorney. CRITICAL risk — do not contact.',
  },
  {
    key: 'federal_dnc',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'critical',
    icon: 'ti-building-government',
    name: 'Federal DNC',
    desc: 'Registered on the National Do Not Call Registry (FTC).',
  },
  {
    key: 'dnc',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'critical',
    icon: 'ti-phone-x',
    name: 'DNC (General)',
    desc: 'Listed on Do Not Call registry.',
  },
  {
    key: 'state_dnc',
    match: v => v && v !== 'N' && v !== 'No' && v !== false && v !== 0 && v !== '',
    severity: 'high',
    icon: 'ti-map-pin-off',
    name: 'State DNC',
    desc: v => `Listed on a State Do Not Call list${typeof v === 'string' && v.length <= 4 ? ` (${v})` : ''}.`,
  },
  {
    key: 'internal_dnc',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'high',
    icon: 'ti-database-x',
    name: 'Internal DNC',
    desc: 'Flagged on your company\'s internal Do Not Call list.',
  },
  {
    key: 'screamer',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'high',
    icon: 'ti-speakerphone',
    name: 'Screamer',
    desc: 'Known hostile caller — prone to aggressive responses or verbal abuse.',
  },
  {
    key: 'complainer',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'medium',
    icon: 'ti-message-report',
    name: 'DNC Complainer',
    desc: 'Has filed formal complaints with the FTC. Legal risk if contacted.',
  },
  {
    key: 'reassigned',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'medium',
    icon: 'ti-arrows-exchange',
    name: 'Reassigned Number',
    desc: 'Number has been reassigned to a new subscriber. Verify consent before dialing.',
  },
  {
    key: 'wireless',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'info',
    icon: 'ti-device-mobile',
    name: 'Wireless / Cell',
    desc: 'This is a cellular number — TCPA rules for auto-dialers apply.',
  },
  {
    key: 'ported',
    match: v => v === 'Y' || v === 'Yes' || v === true || v === 1,
    severity: 'info',
    icon: 'ti-transfer-in',
    name: 'Ported Number',
    desc: 'Number has been ported from its original carrier.',
  },
];

const KEY_ALIASES = {
  nat_dnc:      'federal_dnc',
  national_dnc: 'federal_dnc',
  fed_dnc:      'federal_dnc',
  fdnc:         'federal_dnc',
  sdnc:         'state_dnc',
  int_dnc:      'internal_dnc',
  cell:         'wireless',
  is_cell:      'wireless',
  iscell:       'wireless',
};

// ── Human-readable labels for API code values ─────────────────────
const CODE_LABELS = {
  screamer:   { label: 'Hostile / Screamer',    icon: 'ti-speakerphone'  },
  litigator:  { label: 'TCPA Litigator',        icon: 'ti-gavel'         },
  complainer: { label: 'DNC Complainer',        icon: 'ti-message-report'},
  dnc:        { label: 'Do Not Call',           icon: 'ti-phone-x'       },
  wireless:   { label: 'Wireless Number',       icon: 'ti-device-mobile' },
  ported:     { label: 'Ported Number',         icon: 'ti-transfer-in'   },
  reassigned: { label: 'Reassigned Number',     icon: 'ti-arrows-exchange'},
  federal:    { label: 'Federal DNC',           icon: 'ti-building-government'},
  state:      { label: 'State DNC',             icon: 'ti-map-pin-off'   },
  internal:   { label: 'Internal DNC',          icon: 'ti-database-x'    },
  clean:      { label: 'Clean',                 icon: 'ti-circle-check'  },
};

// ── BOOT ─────────────────────────────────────────────────────────
function boot(){
  if(!isLiveCall()){ renderNoCall(); return; }
  renderPortal();
}

function renderNoCall(){
  document.getElementById('app').innerHTML = `
    <div class="no-call">
      <div class="no-call-icon"><i class="ti ti-phone-off"></i></div>
      <h2>No Webform Detected</h2>
    </div>`;
}

function renderPortal(){
  const phone = getParam('phone');

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="header">
        <div class="logo"><i class="ti ti-shield-check"></i></div>
        <div class="header-txt">
          <h1>DNC Checker</h1>
          <p>Vocal Tech Marketing · Compliance Portal</p>
        </div>
        <div class="live-badge"><div class="dot"></div>Live call</div>
      </div>

      <div class="body">
        <div class="status-display idle" id="statusDisplay">

          <!-- Hero verdict section -->
          <div class="status-hero">
            <div class="status-icon"><i class="ti ti-shield" id="statusIcon"></i></div>
            <div class="status-number" id="statusNumber">—</div>
            <div class="status-verdict" id="statusVerdict">Checking…</div>
            <!-- API message pill shown here -->
            <div class="api-message-pill" id="apiMessagePill">
              <i class="ti ti-tag"></i>
              <span id="apiMessageText"></span>
            </div>
          </div>

          <!-- Individual flag rows -->
          <div class="flags-section" id="flagsSection">
            <div class="flags-label">Detected Flags</div>
            <div id="flagsList"></div>
          </div>

          <!-- Raw JSON toggle -->
          <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()">
            <i class="ti ti-code"></i> Raw API Response
            <span id="rawArrow">▼ SHOW</span>
          </button>
          <div class="raw-body" id="rawBody">
            <pre id="rawJson"></pre>
          </div>

        </div>
      </div>
    </div>`;

  if(phone) setTimeout(() => runCheck(phone), 700);
}

let rawOpen = false;
function toggleRaw(){
  rawOpen = !rawOpen;
  document.getElementById('rawBody').classList.toggle('open', rawOpen);
  document.getElementById('rawArrow').textContent = rawOpen ? '▲ HIDE' : '▼ SHOW';
}

// ── MAIN CHECK ────────────────────────────────────────────────────
async function runCheck(rawPhone){
  const display = document.getElementById('statusDisplay');
  const icon    = document.getElementById('statusIcon');
  const numEl   = document.getElementById('statusNumber');
  const verdict = document.getElementById('statusVerdict');

  const clean = rawPhone.replace(/\D/g,'');

  if(clean.length < 7 || clean.length > 15){
    setInvalid(rawPhone, 'INVALID NUMBER', 'Number format is invalid.');
    return;
  }

  // Loading
  display.className   = 'status-display loading';
  icon.className      = 'ti ti-loader-2';
  numEl.textContent   = formatPhone(rawPhone);
  verdict.textContent = 'Scanning database…';

  try {
    const res = await fetch(`${API_BASE}${clean}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    console.log('BLA API Response:', data);

    document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
    document.getElementById('rawToggle').classList.add('visible');

    const norm = normalise(data);
    const fired = detectFlags(norm);

    // Pull message and code from API response
    const apiMessage = data.message || norm.message || '';
    const apiCode    = data.code    || norm.code    || '';
    const apiStatus  = data.status  || norm.status  || '';

    numEl.textContent = formatPhone(rawPhone);

    if(fired.length === 0){
      display.className   = 'status-display clean';
      icon.className      = 'ti ti-circle-check';
      verdict.textContent = 'CLEAN';
      showApiMessagePill(apiMessage || apiStatus, 'pill-green');
      showCleanFlag(apiCode, apiMessage);
    } else {
      const hasCritical = fired.some(f => f.severity === 'critical');
      const hasHigh     = fired.some(f => f.severity === 'high');
      display.className = hasCritical ? 'status-display bad'
                        : hasHigh     ? 'status-display bad'
                        :               'status-display warn';
      icon.className    = hasCritical ? 'ti ti-ban' : 'ti ti-alert-triangle';
      verdict.textContent = hasCritical ? 'DO NOT TRANSFER'
                          : hasHigh     ? 'HIGH RISK'
                          :               'USE CAUTION';
      showApiMessagePill(apiMessage || apiStatus, hasCritical ? 'pill-green' : 'pill-yellow');
      showFlags(fired, apiCode, apiMessage);
    }

  } catch(err){
    console.error(err);
    setInvalid(rawPhone, 'API ERROR', 'Could not reach Alliance API. Check key, CORS policy, or connection.');
  }
}

// ── HELPERS ────────────────────────────────────────────────────────

function formatPhone(raw){
  const d = raw.replace(/\D/g,'');
  if(d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if(d.length === 11 && d[0]==='1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return raw;
}

function normalise(data){
  const out = {};
  const src = (data.result && typeof data.result === 'object') ? { ...data, ...data.result }
            : (data.data   && typeof data.data   === 'object') ? { ...data, ...data.data }
            : data;
  for(const [k, v] of Object.entries(src)){
    const canon = KEY_ALIASES[k.toLowerCase()] || k.toLowerCase();
    out[canon] = v;
  }
  return out;
}

function detectFlags(norm){
  const fired = [];
  for(const def of FLAG_MAP){
    const val = norm[def.key];
    if(val !== undefined && val !== null && def.match(val)){
      fired.push({ ...def, value: val });
    }
  }
  const order = { critical:0, high:1, medium:2, info:3 };
  fired.sort((a,b) => order[a.severity] - order[b.severity]);
  return fired;
}

// ── Show message pill below verdict ──────────────────────────────
function showApiMessagePill(message, colorClass){
  if(!message) return;
  const pill = document.getElementById('apiMessagePill');
  const text = document.getElementById('apiMessageText');
  text.textContent = message;
  pill.className = `api-message-pill visible ${colorClass}`;
}

// ── API code badge HTML helper ────────────────────────────────────
function buildCodeBadge(code){
  if(!code) return '';
  const codeStr = String(code).toLowerCase();
  const meta = CODE_LABELS[codeStr] || { label: code, icon: 'ti-tag' };
  return `
    <div class="flag-code-badge">
      <i class="ti ${meta.icon}"></i>
      API code: <strong>${meta.label}</strong> <em style="opacity:.6">(${codeStr})</em>
    </div>`;
}

function showFlags(fired, apiCode, apiMessage){
  const section = document.getElementById('flagsSection');
  const list    = document.getElementById('flagsList');
  section.classList.add('visible');

  // Build flag rows
  let html = fired.map((f, i) => {
    const desc = typeof f.desc === 'function' ? f.desc(f.value) : f.desc;
    // Attach the API code badge to the FIRST flag row only (most prominent)
    const codeBadge = i === 0 ? buildCodeBadge(apiCode) : '';
    return `
      <div class="flag-row flag-${f.severity}" style="animation-delay:${i*60}ms">
        <i class="ti ${f.icon}"></i>
        <div style="flex:1">
          <div class="flag-name">${f.name}</div>
          <div class="flag-desc">${desc}</div>
          ${codeBadge}
        </div>
      </div>`;
  }).join('');

  list.innerHTML = html;
}

function showCleanFlag(apiCode, apiMessage){
  const section = document.getElementById('flagsSection');
  const list    = document.getElementById('flagsList');
  section.classList.add('visible');
  const codeBadge = buildCodeBadge(apiCode);
  list.innerHTML = `
    <div class="flag-row flag-clean">
      <i class="ti ti-shield-check"></i>
      <div style="flex:1">
        <div class="flag-name">No Records Found</div>
        <div class="flag-desc">Not in any blacklist, DNC, litigator, or complaint registry.</div>
        ${codeBadge}
      </div>
    </div>`;
}

function setInvalid(phone, title, msg){
  const display = document.getElementById('statusDisplay');
  document.getElementById('statusIcon').className = 'ti ti-alert-triangle';
  document.getElementById('statusNumber').textContent = phone;
  document.getElementById('statusVerdict').textContent = title;
  display.className = 'status-display invalid';
  const section = document.getElementById('flagsSection');
  const list    = document.getElementById('flagsList');
  section.classList.add('visible');
  list.innerHTML = `
    <div class="flag-row flag-medium">
      <i class="ti ti-info-circle"></i>
      <div>
        <div class="flag-name">Check Failed</div>
        <div class="flag-desc">${msg}</div>
      </div>
    </div>`;
}
