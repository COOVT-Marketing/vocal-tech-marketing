<!DOCTYPE html>
<html lang="en">
<head>
<title>VTM DNC Portal</title>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root {
  --bg:        #0b0f19;
  --card:      #111827;
  --card2:     #1f2937;
  --border:    #374151;
  --txt:       #f9fafb;
  --txt2:      #9ca3af;
  --txt3:      #6b7280;
  --teal:      #1a9e75;
  --teal-glow: rgba(26,158,117,0.15);
  --teal-b:    rgba(26,158,117,0.35);
  --green:     #22c55e;
  --green-glow:rgba(34,197,94,0.12);
  --green-b:   rgba(34,197,94,0.4);
  --red:       #ef4444;
  --red-glow:  rgba(239,68,68,0.12);
  --red-b:     rgba(239,68,68,0.4);
  --yellow:    #f59e0b;
  --yellow-glow:rgba(245,158,11,0.12);
  --yellow-b:  rgba(245,158,11,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
}
.card{
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:16px;
  width:100%;max-width:520px;
  overflow:hidden;
  box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
}
.header{
  background:#090d16;
  padding:1.4rem 2rem;
  display:flex;align-items:center;gap:14px;
  border-bottom:0.5px solid var(--border);
}
.logo{
  width:40px;height:40px;
  background:var(--teal);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.logo i{font-size:22px;color:#fff}
.header-txt h1{font-size:16px;font-weight:600;color:#fff}
.header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}
.live-badge{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  background:var(--teal-glow);
  border:0.5px solid var(--teal-b);
  border-radius:20px;padding:4px 12px;
  font-size:12px;color:var(--teal);font-weight:500;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.body{padding:2rem}
.session-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--card2);
  border:0.5px solid var(--border);
  border-radius:8px;padding:10px 14px;
  margin-bottom:1.5rem;
}
.session-bar i{font-size:16px;color:var(--teal)}
.session-bar span{font-size:13px;color:var(--txt2)}
.session-bar .time{
  margin-left:auto;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--txt2);
  background:var(--bg);
  border:0.5px solid var(--border);
  padding:2px 8px;border-radius:4px;
}
.status-display{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2.5rem 1.5rem;
  border-radius:14px;
  border:0.5px solid var(--border);
  background:var(--card2);
  min-height:200px;
  transition:background 0.5s ease, border-color 0.5s ease;
}
.status-display.idle{background:var(--card2);border-color:var(--border);}
.status-display.loading{background:var(--card2);border-color:var(--teal-b);}
.status-display.clean{background:var(--green-glow);border-color:var(--green-b);animation:greenPulse 2s ease forwards;}
.status-display.bad{background:var(--red-glow);border-color:var(--red-b);animation:redPulse 2s ease forwards;}
.status-display.invalid{background:var(--yellow-glow);border-color:var(--yellow-b);}
@keyframes greenPulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)}
}
@keyframes redPulse{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}
  50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)}
  100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)}
}
.status-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1rem;
  transition:background 0.4s;
}
.idle .status-icon{background:rgba(255,255,255,0.05)}
.idle .status-icon i{font-size:36px;color:var(--txt3)}
.loading .status-icon{background:var(--teal-glow)}
.loading .status-icon i{font-size:36px;color:var(--teal);animation:spin 0.8s linear infinite}
.clean .status-icon{background:rgba(34,197,94,0.2)}
.clean .status-icon i{font-size:36px;color:var(--green)}
.bad .status-icon{background:rgba(239,68,68,0.2)}
.bad .status-icon i{font-size:36px;color:var(--red)}
.invalid .status-icon{background:rgba(245,158,11,0.2)}
.invalid .status-icon i{font-size:36px;color:var(--yellow)}
@keyframes spin{to{transform:rotate(360deg)}}
.status-number{
  font-family:'DM Mono',monospace;
  font-size:22px;font-weight:500;
  letter-spacing:.06em;
  margin-bottom:.5rem;
  transition:color 0.4s;
}
.idle .status-number{color:var(--txt3)}
.loading .status-number{color:var(--txt2)}
.clean .status-number{color:var(--green)}
.bad .status-number{color:var(--red)}
.invalid .status-number{color:var(--yellow)}
.status-verdict{
  font-size:28px;font-weight:700;
  letter-spacing:.02em;
  transition:color 0.4s;
}
.idle .status-verdict{color:var(--txt3);font-size:16px;font-weight:400}
.loading .status-verdict{color:var(--txt2);font-size:16px;font-weight:400}
.clean .status-verdict{color:var(--green)}
.bad .status-verdict{color:var(--red)}
.invalid .status-verdict{color:var(--yellow);font-size:18px}
.status-sub{margin-top:.4rem;font-size:12px;color:var(--txt2);text-align:center;}
.no-call{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;}
.no-call-icon{width:72px;height:72px;border-radius:50%;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;}
.no-call-icon i{font-size:32px;color:var(--txt2)}
.no-call h2{font-size:18px;font-weight:500}
@media(max-width:480px){.body{padding:1.25rem}.header{padding:1.25rem}}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── YOUR API KEY — insert it here ────────────────────────────────
const API_KEY = 'zkU3p9bRrzVDgcKRC2sK';

// ── API ENDPOINT ─────────────────────────────────────────────────
const API_BASE = `https://api.blacklistalliance.net/standard/api/v1/Lookup/key/${API_KEY}/response/json/phone/`;

// ── PARAMS ───────────────────────────────────────────────────────
const ALIASES = {
  phone:    ['phone_number','phone','phonenumber'],
  campaign: ['campaign','campaign_id'],
  agent:    ['user','agent','agent_name','fullname'],
};
function getParam(name){
  const params = new URLSearchParams(window.location.search);
  for(const k of (ALIASES[name]||[name])){
    const v = params.get(k);
    if(v && v.trim()) return v.trim();
  }
  return '';
}
function isLiveCall(){
  const params = new URLSearchParams(window.location.search);
  return ['phone_number','phone','campaign','list_id','lead_id'].some(p => params.get(p));
}

// ── BOOT ─────────────────────────────────────────────────────────
function boot(){
  if(!isLiveCall()){ renderNoCall(); return; }
  renderPortal();
}

function renderNoCall(){
  document.getElementById('app').innerHTML = `
    <div class="no-call">
      <div class="no-call-icon"><i class="ti ti-phone-off"></i></div>
      <h2>No Webform Detected</h2>
    </div>`;
}

function renderPortal(){
  const phone = getParam('phone');

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="header">
        <div class="logo"><i class="ti ti-shield-check"></i></div>
        <div class="header-txt">
          <h1>DNC Checker</h1>
          <p>Vocal Tech Marketing · DNC Portal</p>
        </div>
        <div class="live-badge"><div class="dot"></div>Live call</div>
      </div>

      <div class="body">
        <div class="status-display idle" id="statusDisplay">
          <div class="status-icon"><i class="ti ti-shield" id="statusIcon"></i></div>
          <div class="status-number" id="statusNumber">—</div>
          <div class="status-verdict" id="statusVerdict">Checking...</div>
          <div class="status-sub" id="statusSub"></div>
        </div>
      </div>
    </div>`;

  if(phone) setTimeout(() => runCheck(phone), 700);
}

// ── CHECK via Alliance API ────────────────────────────────────────
async function runCheck(rawPhone){
  const display = document.getElementById('statusDisplay');
  const icon    = document.getElementById('statusIcon');
  const numEl   = document.getElementById('statusNumber');
  const verdict = document.getElementById('statusVerdict');
  const sub     = document.getElementById('statusSub');

  const clean = rawPhone.replace(/\D/g,'');

  // Basic format check before hitting API
  if(clean.length < 7 || clean.length > 15){
    display.className   = 'status-display invalid';
    icon.className      = 'ti ti-alert-triangle';
    numEl.textContent   = rawPhone;
    verdict.textContent = 'INVALID';
    sub.textContent     = 'Number format is invalid.';
    return;
  }

  // Loading state
  display.className   = 'status-display loading';
  icon.className      = 'ti ti-loader-2';
  numEl.textContent   = rawPhone;
  verdict.textContent = 'Scanning database…';
  sub.textContent     = '';

  try {
    const response = await fetch(`${API_BASE}${clean}`);

    if(!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    
    console.log("Alliance API Payload Response:", data);

    const isDnc = data.dnc === 'Y' || data.dnc === 'Yes' || String(data.message).toLowerCase().includes('dnc');
    const isLitigator = data.litigator === 'Y' || data.litigator === 'Yes' || String(data.message).toLowerCase().includes('litigator');
    const explicitlyListed = data.result === 'blacklisted' || data.status === 'blacklisted' || data.code === 400;

    if (isDnc || isLitigator || explicitlyListed) {
      display.className   = 'status-display bad';
      icon.className      = 'ti ti-ban';
      verdict.textContent = 'Do Not Transfer';
      
      if (isDnc && isLitigator) sub.textContent = 'CRITICAL: Found in Litigator & DNC Registries!';
      else if (isLitigator) sub.textContent = 'FOUND: Abusive Litigator Database (TCPA Risk)';
      else if (isDnc) sub.textContent = 'FOUND: Do Not Call (DNC) Registry';
      else sub.textContent = data.message || 'Found in Alliance database restrictions.';
    } else {
      display.className   = 'status-display clean';
      icon.className      = 'ti ti-circle-check';
      verdict.textContent = 'CLEAN';
      sub.textContent     = 'No records found in blacklist or DNC databases.';
    }

    numEl.textContent = rawPhone;

  } catch(err) {
    display.className   = 'status-display invalid';
    icon.className      = 'ti ti-wifi-off';
    numEl.textContent   = rawPhone;
    verdict.textContent = 'API ERROR';
    sub.textContent = 'Could not reach Alliance API. Check your key, server CORS policy, or connection.';
  }
}

boot();
</script>
</body>
</html>
