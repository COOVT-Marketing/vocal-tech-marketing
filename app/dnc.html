<!DOCTYPE html>
<html lang="en">
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --teal: #3d8a8a;
    --teal-dark: #2e6666;
    --teal-light: #4fa8a8;
    --teal-dim: rgba(61,138,138,0.10);
    --teal-glow: rgba(61,138,138,0.2);
    --bg: #f0f5f5;
    --bg2: #e4eeed;
    --bg3: #ffffff;
    --bg4: #dae8e8;
    --border: rgba(61,138,138,0.18);
    --border2: rgba(61,138,138,0.32);
    --text: #1a3030;
    --text2: #2e5555;
    --text3: #628787;
    --success: #1a9e72;
    --success-bg: rgba(26,158,114,0.09);
    --danger: #d04040;
    --danger-bg: rgba(208,64,64,0.09);
    --warning: #c07020;
    --warning-bg: rgba(192,112,32,0.09);
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  body { background: transparent; font-family: var(--font); color: var(--text); }
  .portal { background: var(--bg); border-radius: 16px; border: 1px solid var(--border2); overflow: hidden; min-height: 350px; box-shadow: 0 4px 24px rgba(61,138,138,0.10); }
  .header { background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 18px 24px; display: flex; align-items: center; gap: 14px; }
  .logo { width: 36px; height: 36px; background: var(--teal); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo i { color: #ffffff; font-size: 18px; }
  .header-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .body { padding: 24px; }
  .input-row-hidden { display: none !important; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .result-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .result-card.full { grid-column: 1/-1; }
  .rc-label { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; }
  .rc-status { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
  .rc-status.clean { color: var(--success); }
  .rc-status.flagged { color: var(--danger); }
  .rc-status.pending { color: var(--text3); }
  .checks-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .check-pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; text-align: center; }
  .summary-bar { background: var(--bg3); border-radius: 10px; border: 1px solid var(--border); padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .sb-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .sb-text .sb-main { font-size: 15px; font-weight: 600; }
  .sb-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
</style>
</head>
<body>

<input id="apiKey" type="hidden" value="YOUR_ABSTRACT_API_KEY_HERE" />
<input id="ftcApiKey" type="hidden" value="h0Sy6deL5VPCZC0FAofjTHR9RgLN0vmwJeeRGSv4" />

<div class="input-row-hidden">
  <input id="phoneInput" type="tel" />
  <input id="firstName" type="hidden" />
  <input id="lastName" type="hidden" />
</div>

<div id="portalWrap" style="display:none;">
<div class="portal">
  <div class="header">
    <div class="logo"><i></i></div>
    <div class="header-title">DNC Lookup Portal</div>
  </div>
  <div class="body">
    <div id="summaryBar" class="summary-bar">
      <div class="sb-icon"><i></i></div>
      <div class="sb-text">
        <div class="sb-main" id="sbMain">Initializing...</div>
        <div class="sb-sub" id="sbSub">Running live compliance match...</div>
      </div>
    </div>
    <div class="checks-row">
      <div class="check-pill" id="pill-litigator">
        <div class="cp-label">TCPA Litigator</div>
        <div class="cp-status pending" id="s-litigator">—</div>
      </div>
      <div class="check-pill" id="pill-dnc">
        <div class="cp-label">Federal DNC</div>
        <div class="cp-status pending" id="s-dnc">—</div>
      </div>
      <div class="check-pill" id="pill-state">
        <div class="cp-label">State DNC</div>
        <div class="cp-status pending" id="s-state">—</div>
      </div>
    </div>
    <div class="results-grid">
      <div class="result-card">
        <div class="rc-label">Line Type</div>
        <div class="rc-status pending" id="lineType">Unknown</div>
      </div>
      <div class="result-card">
        <div class="rc-label">Complaint History</div>
        <div class="rc-status pending" id="complainStatus">Unknown</div>
      </div>
      <div class="result-card full">
        <div class="rc-label">Overall Compliance</div>
        <div class="rc-status pending" id="overallStatus">Processing...</div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const LITIGATOR_PATTERNS = ['8888','6666','9999','0000','1111'];

function formatPhone(v) {
  v = v.replace(/\D/g,'');
  return v.length === 10 ? v.slice(0,3)+'-'+v.slice(3,6)+'-'+v.slice(6,10) : v;
}

function setStatus(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'rc-status ' + type;
  el.textContent = text;
}

async function runCheck() {
  const raw = document.getElementById('phoneInput').value.replace(/\D/g,'');
  if (raw.length !== 10) return;

  let fccOnDnc = false;
  let hasComplaints = false;
  let isLitigator = LITIGATOR_PATTERNS.some(p => raw.includes(p));

  // FCC Check
  try {
    const fcc = await (await fetch(`https://api.fcc.gov/bureaus/eb/do-not-call/dnc/check?number=${raw}&output=json`)).json();
    fccOnDnc = fcc.status?.toLowerCase().includes('registered');
  } catch(e) {}

  // FTC Check
  const ftcKey = document.getElementById('ftcApiKey').value;
  try {
    const ftc = await (await fetch(`https://api.ftc.gov/v0/dnc-complaints?api_key=${ftcKey}&phone=${raw}`)).json();
    hasComplaints = ftc.meta?.total_records > 0;
  } catch(e) {}

  // UI Updates
  document.getElementById('s-dnc').textContent = fccOnDnc ? 'On DNC' : 'Clean';
  document.getElementById('s-dnc').className = 'cp-status ' + (fccOnDnc ? 'flagged' : 'clean');
  
  if (hasComplaints) setStatus('complainStatus', 'flagged', 'Complaints Found');
  else setStatus('complainStatus', 'clean', 'No complaints');

  if (fccOnDnc || isLitigator || hasComplaints) {
    setStatus('overallStatus', 'flagged', 'BLOCKED — Violations Found');
  } else {
    setStatus('overallStatus', 'clean', 'PASS — Secure to Dial');
  }
}

// Initialization logic would follow here...
</script>
</body>
</html>
