<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>D1 Form</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
    
    <style>
        :root {
            --bg:        #0b0f19;
            --card:      #111827;
            --card2:     #1f2937;
            --border:    #374151;
            --txt:       #f9fafb;
            --txt2:      #9ca3af;
            --txt3:      #6b7280;
            --teal:      #1a9e75;
            --teal-glow: rgba(26,158,117,0.15);
            --teal-b:    rgba(26,158,117,0.35);
            --green:     #22c55e;
            --green-glow:rgba(34,197,94,0.12);
            --green-b:   rgba(34,197,94,0.4);
            --red:       #ef4444;
            --red-glow:  rgba(239,68,68,0.12);
            --red-b:     rgba(239,68,68,0.4);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg);
            color:var(--txt);
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            padding:2rem 1rem;
        }
        .card {
            background:var(--card);
            border:0.5px solid var(--border);
            border-radius:16px;
            width:100%;max-width:540px;
            overflow:hidden;
            box-shadow:0 25px 30px -8px rgba(0,0,0,0.6);
        }
        .header {
            background:#090d16;
            padding:1.4rem 2rem;
            display:flex;align-items:center;gap:14px;
            border-bottom:0.5px solid var(--border);
        }
        .logo {
            width:40px;height:40px;
            background:var(--teal);
            border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
        }
        .logo i{font-size:22px;color:#fff}
        .header-txt h1{font-size:16px;font-weight:600;color:#fff}
        .header-txt p{font-size:12px;color:var(--txt2);margin-top:2px}
        
        .body{padding:2rem}
        
        .status-display {
            border-radius:14px;
            border:0.5px solid var(--border);
            background:var(--card2);
            overflow:hidden;
            transition:border-color 0.4s ease;
        }
        .status-display.loading{ border-color:var(--teal-b); }
        .status-display.clean  { border-color:var(--green-b); animation:greenPulse 2s ease forwards; }
        .status-display.bad    { border-color:var(--red-b);   animation:redPulse 2s ease forwards; }
        
        @keyframes greenPulse{ 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 40px 8px rgba(34,197,94,0.25)} 100%{box-shadow:0 0 20px 4px rgba(34,197,94,0.1)} }
        @keyframes redPulse{   0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 40px 8px rgba(239,68,68,0.25)} 100%{box-shadow:0 0 20px 4px rgba(239,68,68,0.1)} }
        
        .status-hero {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:2.2rem 1.5rem 1.6rem;
            transition:background 0.5s ease;
            gap:0;
        }
        .loading .status-hero { background:var(--card2); }
        .clean   .status-hero { background:var(--green-glow); }
        .bad     .status-hero { background:var(--red-glow); }
        
        .status-icon {
            width:72px; height:72px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            margin-bottom:1rem;
            transition:background 0.4s;
        }
        .loading .status-icon { background:var(--teal-glow) }
        .loading .status-icon i { font-size:36px; color:var(--teal); animation:spin 0.8s linear infinite }
        .clean   .status-icon { background:rgba(34,197,94,0.2) }
        .clean   .status-icon i { font-size:36px; color:var(--green) }
        .bad     .status-icon { background:rgba(239,68,68,0.2) }
        .bad     .status-icon i { font-size:36px; color:var(--red) }
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .status-number {
            font-family:'DM Mono',monospace;
            font-size:20px; font-weight:500;
            letter-spacing:.06em;
            margin-bottom:.5rem;
            transition:color 0.4s;
        }
        .loading .status-number { color:var(--txt2) }
        .clean   .status-number { color:var(--green) }
        .bad     .status-number { color:var(--red) }
        
        .status-verdict {
            font-size:26px; font-weight:700; letter-spacing:.02em;
            transition:color 0.4s;
        }
        .loading .status-verdict { color:var(--txt2); font-size:15px; font-weight:400 }
        .clean   .status-verdict { color:var(--green) }
        .bad     .status-verdict { color:var(--red) }
        
        .flags-section {
            padding:0 1.2rem 1.4rem;
            display:none;
            flex-direction:column;
            gap:8px;
        }
        .flags-section.visible { display:flex; }
        .flags-label {
            font-size:10px; font-weight:600; letter-spacing:.1em;
            color:var(--txt3); text-transform:uppercase;
            padding:0 2px; margin-bottom:2px;
        }
        .flag-row {
            display:flex; align-items:flex-start; gap:10px;
            padding:10px 14px;
            border-radius:8px;
            border:0.5px solid;
            animation:flagIn 0.3s ease forwards;
        }
        @keyframes flagIn{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .flag-row i { font-size:17px; flex-shrink:0; margin-top:1px; }
        .flag-row .flag-name { font-size:13px; font-weight:600; }
        .flag-row .flag-desc { font-size:11px; color:var(--txt2); line-height:1.35; margin-top:2px }
        
        .flag-critical { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.35); }
        .flag-critical i, .flag-critical .flag-name { color:var(--red) }
        .flag-clean { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.3); }
        .flag-clean i, .flag-clean .flag-name { color:var(--green) }
        
        @media(max-width:480px){ .body{padding:1.25rem} .header{padding:1.25rem} }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo"><i class="ti ti-database-export"></i></div>
        <div class="header-txt">
            <h1>D1 Form</h1>
            <p>Vocal Tech Marketing</p>
        </div>
    </div>
    <div class="body">
        <div class="status-display loading" id="statusDisplay">
            <div class="status-hero">
                <div class="status-icon"><i class="ti ti-loader-2" id="statusIcon"></i></div>
                <div class="status-number" id="statusNumber">—</div>
                <div class="status-verdict" id="statusVerdict">Processing Transfer...</div>
            </div>
            <div class="flags-section" id="flagsSection">
                <div class="flags-label">Pipeline Output Log</div>
                <div id="flagsList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function formatPhone(d) {
        d = d.replace(/\D/g,'');
        if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
        if (d.length === 11 && d[0]==='1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
        return d;
    }

    async function processPipeline() {
        const display = document.getElementById('statusDisplay');
        const icon = document.getElementById('statusIcon');
        const numEl = document.getElementById('statusNumber');
        const verdict = document.getElementById('statusVerdict');
        const section = document.getElementById('flagsSection');
        const list = document.getElementById('flagsList');

        // Automatically read variables directly out of the browser URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        const firstName = urlParams.get('first');
        const lastName = urlParams.get('last');
        const phone = urlParams.get('phone');
        const state = urlParams.get('state');
        const zipCode = urlParams.get('zip');

        // Check if phone number parameter is missing
        if (!phone) {
            display.className = 'status-display bad';
            icon.className = 'ti ti-alert-triangle';
            numEl.textContent = 'ERROR';
            verdict.textContent = 'MISSING DATA';
            section.classList.add('visible');
            list.innerHTML = `
                <div class="flag-row flag-critical">
                    <i class="ti ti-info-circle"></i>
                    <div style="flex:1">
                        <div class="flag-name">Parsing Aborted</div>
                        <div class="flag-desc">No phone number payload parameter detected from the active dialer link.</div>
                    </div>
                </div>`;
            return;
        }

        const cleanNum = phone.replace(/\D/g,'');
        numEl.textContent = formatPhone(cleanNum);
        verdict.textContent = 'Syncing...';

        // Strip special characters and normalize phone to proper E.164 syntax (+1)
        const formattedPhone = cleanNum.startsWith('1') ? `+${cleanNum}` : `+1${cleanNum}`;

        // Construct standard GoHighLevel Payload JSON structure
        const ghlPayload = {
            firstName: firstName || "",
            lastName: lastName || "",
            phone: formattedPhone,
            state: state ? state.toUpperCase() : "",
            postalCode: zipCode || "",
            tags: ["VTM Live Transfer", "Vicidial Automated Hook"]
        };

        // Francis's unique GoHighLevel V2 Token API Key
        const GHL_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJsb2NhdGlvbl9pZCI6ImlUWkhhRFIxUEhSNmMzYjRoc1ppIiwidmVyc2lvbiI6MSwiaWF0IjoxNzczMDQwMzY5MTQ2LCJzdWIiOiJxNmNjOEJKMm9lc2RVdHN0R1lkeCJ9.aXhksM653vwdZFJFox1hiLc6-f32OmIHMG2gpQRacG8";

        try {
            // DIRECT REQUEST: Fired natively straight to GHL without proxy wrappers
            const response = await fetch('https://services.leadconnectorhq.com/support/v2/contacts', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GHL_API_KEY}`,
                    'Version': '2021-04-15',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(ghlPayload)
            });

            const result = await response.json();
            section.classList.add('visible');

            if (response.ok) {
                display.className = 'status-display clean';
                icon.className = 'ti ti-circle-check';
                verdict.textContent = 'SUCCESS!';
                list.innerHTML = `
                    <div class="flag-row flag-clean">
                        <i class="ti ti-shield-check"></i>
                        <div style="flex:1">
                            <div class="flag-name">Lead Synchronized</div>
                            <div class="flag-desc">Successfully sent!.</div>
                        </div>
                    </div>`;
            } else {
                console.error("GHL Server Response Rejection:", result);
                throw new Error(result.message || "CRM verification payload rejected.");
            }

        } catch (error) {
            console.error('API Process Exception:', error);
            display.className = 'status-display bad';
            icon.className = 'ti ti-ban';
            verdict.textContent = 'SYNC FAILED';
            section.classList.add('visible');
            list.innerHTML = `
                <div class="flag-row flag-critical">
                    <i class="ti ti-alert-triangle"></i>
                    <div style="flex:1">
                        <div class="flag-name">Transmission Interrupted</div>
                        <div class="flag-desc">API Error: ${error.message}</div>
                    </div>
                </div>`;
        }
    }

    // Trigger execution instantly when the layout finishes loading
    window.onload = processPipeline;
</script>

</body>
</html>
